  if (!onboarded) {
    return (
      <div style={{ height: '100%', background: '#0c0c18', color: '#fff', fontFamily: "'SF Pro Display',-apple-system,BlinkMacSystemFont,sans-serif", maxWidth: 500, margin: '0 auto' }}>
        <style>{`@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;600;700&display=swap');input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}`}</style>
        {OnboardingScreen()}
        {toast && <div className="pop" style={{ position: 'fixed', bottom: 40, left: '50%', transform: 'translateX(-50%)', padding: '11px 20px', borderRadius: 24, background: 'rgba(75,222,128,0.96)', color: '#000', fontWeight: 700, fontSize: 13, zIndex: 900 }}>{toast.msg}</div>}
      </div>
    );
  }

  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: '#0c0c18', color: '#fff', fontFamily: "'SF Pro Display',-apple-system,BlinkMacSystemFont,sans-serif", maxWidth: 500, margin: '0 auto', position: 'relative' }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;600;700&display=swap');
        .pop{animation:popIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275) both;}
        @keyframes popIn{from{transform:scale(0.85);opacity:0}to{transform:scale(1);opacity:1}}
        input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
        ::-webkit-scrollbar{width:2px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px;}
      `}</style>

      <div style={{ height: 'env(safe-area-inset-top)', background: '#0c0c18', flexShrink: 0 }} />

      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        {screen === 'home'       && HomeScreen()}
        {screen === 'log'        && LoggerScreen()}
        {screen === 'train'      && WorkoutScreen()}
        {screen === 'cook'       && CookbookScreen()}
        {screen === 'plan'       && PlannerScreen()}
        {screen === 'shop'       && ShoppingScreen()}
        {screen === 'profile'    && ProfileScreen()}
        {screen === 'challenges' && ChallengesScreen()}
      </div>

      <div style={{ display: 'flex', background: 'rgba(10,10,20,0.98)', borderTop: '1px solid rgba(255,255,255,0.06)', paddingBottom: 'max(env(safe-area-inset-bottom),4px)', flexShrink: 0 }}>
        {NAV.map(({ id, icon, label }) => {
          const active = screen === id;
          return (
            <button key={id} onClick={() => setScreen(id)} style={{ flex: 1, padding: '8px 2px', border: 'none', background: 'transparent', color: active ? accentColor : '#3a4a5a', cursor: 'pointer', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2, transition: 'color 0.15s', position: 'relative' }}>
              {id === 'profile'
                ? <span style={{ fontSize: 18, lineHeight: 1, filter: active ? 'none' : 'grayscale(1) opacity(0.4)' }}>{icon}</span>
                : <span style={{ fontSize: 18, lineHeight: 1 }}>{icon}</span>}
              <span style={{ fontSize: 8, fontFamily: "'Oswald',sans-serif", fontWeight: 600, letterSpacing: 0.5 }}>{label.toUpperCase()}</span>
              {active && <div style={{ position: 'absolute', bottom: 0, left: '50%', transform: 'translateX(-50%)', width: 20, height: 2, borderRadius: 1, background: accentColor }} />}
            </button>
          );
        })}
      </div>

      {toast && (
        <div className="pop" style={{ position: 'fixed', bottom: 80, left: '50%', transform: 'translateX(-50%)', padding: '11px 20px', borderRadius: 24, background: toast.type === 'error' ? 'rgba(255,80,80,0.96)' : toast.type === 'info' ? 'rgba(74,158,255,0.96)' : 'rgba(75,222,128,0.96)', color: '#000', fontWeight: 700, fontSize: 13, zIndex: 900, boxShadow: '0 4px 24px rgba(0,0,0,0.5)', whiteSpace: 'nowrap', maxWidth: '90vw', textAlign: 'center' }}>
          {toast.msg}
        </div>
      )}

      {badge && (
        <div className="pop" style={{ position: 'fixed', top: '50%', left: '50%', transform: 'translate(-50%,-50%)', padding: '28px 32px', borderRadius: 24, background: 'rgba(10,10,20,0.98)', border: `2px solid ${badge.color || accentColor}`, zIndex: 800, textAlign: 'center', boxShadow: '0 8px 60px rgba(0,0,0,0.8)', maxWidth: '85vw' }}>
          <div style={{ fontSize: 44, marginBottom: 6 }}>{badge.emoji || '🏆'}</div>
          <div style={{ fontSize: 10, color: badge.color || accentColor, letterSpacing: 2, fontWeight: 700, marginBottom: 6 }}>BADGE UNLOCKED</div>
          <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 24, color: badge.color || accentColor, letterSpacing: 1, marginBottom: 5 }}>{badge.msg}</div>
          {badge.sub && <div style={{ fontSize: 12, color: '#aaa' }}>{badge.sub}</div>}
        </div>
      )}

      {showBarcode && <BarcodeScanner onScan={handleBarcodeScan} onClose={() => setShowBarcode(false)} />}
      {showSettings && SettingsModal()}
      {showAuth && <AuthModal />}
      {showCheckIn && <DailyCheckInModal />}

      {/* ── PENDING CHALLENGE MODAL ── */}
      {pendingChallenge && (
        <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.88)', zIndex:700, display:'flex', alignItems:'center', justifyContent:'center', padding:24 }}>
          <div className="pop" style={{ width:'100%', maxWidth:360, background:'#111520', borderRadius:24, padding:28, border:`2px solid ${accentColor}50`, boxShadow:`0 0 60px ${accentColor}25` }}>
            <div style={{ textAlign:'center', marginBottom:20 }}>
              <div style={{ fontSize:52, marginBottom:10 }}>{pendingChallenge.emoji || '🏆'}</div>
              <div style={{ fontFamily:"'Bebas Neue',sans-serif", fontSize:11, letterSpacing:4, color:accentColor, marginBottom:6 }}>CHALLENGE INCOMING</div>
              <div style={{ fontFamily:"'Oswald',sans-serif", fontSize:22, fontWeight:700, color:'#fff' }}>{pendingChallenge.title}</div>
              {pendingChallenge.inviterName && (
                <div style={{ fontSize:13, color:'#4a6a7a', marginTop:6 }}>from <span style={{ color:accentColor, fontWeight:700 }}>{pendingChallenge.inviterName}</span></div>
              )}
            </div>
            <div style={{ background:'rgba(255,255,255,0.04)', borderRadius:14, padding:'14px 16px', marginBottom:20 }}>
              {[
                { label:'Type',     value: pendingChallenge.type?.charAt(0).toUpperCase() + (pendingChallenge.type?.slice(1)||'') },
                { label:'Target',   value: pendingChallenge.type==='custom' ? 'Your call' : `${pendingChallenge.target} ${pendingChallenge.type==='calories'?'kcal':pendingChallenge.type==='budget'?'$/wk':'per day'}` },
                { label:'Duration', value: `${pendingChallenge.durationDays} days` },
                { label:'Starts',   value: 'Today' },
              ].map(r => (
                <div key={r.label} style={{ display:'flex', justifyContent:'space-between', padding:'5px 0', borderTop:'1px solid rgba(255,255,255,0.04)' }}>
                  <span style={{ fontSize:12, color:'#4a6a7a' }}>{r.label}</span>
                  <span style={{ fontSize:12, color:'#ddd', fontWeight:700 }}>{r.value}</span>
                </div>
              ))}
            </div>
            <div style={{ display:'flex', gap:10 }}>
              <button onClick={() => setPendingChallenge(null)} style={{ flex:1, padding:14, borderRadius:14, border:'1px solid rgba(255,255,255,0.1)', background:'transparent', color:'#aaa', fontFamily:"'Oswald',sans-serif", fontSize:15, fontWeight:700, cursor:'pointer' }}>
                DECLINE
              </button>
              <button onClick={() => {
                const accepted = { ...pendingChallenge, startDate: pendingChallenge.startDate || todayStr(), createdAt: Date.now(), isOwn: false };
                // Keep original ID so everyone shares the same leaderboard on Gun
                setMyChallenges(p => [...p.filter(c => c.id !== accepted.id), accepted]);
                gunSyncProgress(accepted); // push my progress immediately
                setPendingChallenge(null);
                setScreen('challenges');
                showToast(`Challenge accepted! Let's go 🔥`, 'success');
              }} style={{ flex:2, padding:14, borderRadius:14, border:'none', background:accentColor, color:'#000', fontFamily:"'Oswald',sans-serif", fontSize:16, fontWeight:800, cursor:'pointer', letterSpacing:0.5 }}>
                ⚔️ ACCEPT
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── SERVICE WORKER ── */
if ('serviceWorker' in navigator) {
  const sw = `const C='drews-hub-v20';self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(['.'])));self.skipWaiting();});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim();});self.addEventListener('fetch',e=>{if(e.request.method!=='GET')return;const u=e.request.url;if(u.includes('api.anthropic.com')||u.includes('openfoodfacts')||u.includes('themealdb')||u.includes('fonts.googleapis')||u.includes('cdnjs')||u.includes('supabase.co'))return;e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{if(res&&res.ok){const cl=res.clone();caches.open(C).then(c=>c.put(e.request,cl));}return res;})));});`;
  try { navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw], { type: 'application/javascript' }))).catch(() => {}); } catch {}
}

ReactDOM.render(React.createElement(FitnessHub), document.getElementById('root'));
</script>
</body>
</html>
