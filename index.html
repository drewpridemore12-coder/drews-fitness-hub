/* ── INGREDIENT COST LOOKUP ($/lb unless noted) ── */
const INGREDIENT_COSTS = {
  "chicken breast":6.0,"boneless skinless chicken":6.0,"chicken thigh":4.5,"ground turkey":5.5,
  "lean ground turkey":5.5,"ground beef":6.5,"tuna":1.2,"eggs":0.25,"egg":0.25,
  "greek yogurt":0.2,"cottage cheese":0.22,"whey protein":1.5,"protein powder":1.5,
  "oats":0.1,"rolled oats":0.1,"white rice":0.06,"brown rice":0.08,
  "sweet potato":0.9,"potato":0.5,"broccoli":1.5,"frozen mixed veggies":0.15,
  "black beans":0.9,"kidney beans":0.9,"chickpeas":1.0,"lentils":0.8,
  "banana":0.3,"apple":0.5,"spinach":0.25,"almond milk":0.05,
  "olive oil":0.3,"soy sauce":0.05,"garlic":0.3,"onion":0.4,
};

function estimateIngredientCost(item, qty, unit) {
  const key = item.toLowerCase();
  const match = Object.keys(INGREDIENT_COSTS).find(k => key.includes(k));
  if (!match) return 0.50;
  const cPerOz = INGREDIENT_COSTS[match] / 16;
  const oz = unit === "oz" ? qty : unit === "lbs" || unit === "lb" ? qty * 16
    : unit === "cup" ? qty * 8 : unit === "tbsp" ? qty * 0.5 : unit === "tsp" ? qty * 0.17
    : unit === "each" || unit === "medium" || unit === "large" ? qty * 4 : qty * 2;
  return Math.round(cPerOz * oz * 100) / 100;
}

function estimateRecipeCost(recipe) {
  if (!recipe.ingredients) return 0;
  const total = recipe.ingredients.reduce((s, i) =>
    s + estimateIngredientCost(i.item, i.qty, i.unit), 0);
  return Math.round((total / (recipe.baseServings || 1)) * 100) / 100;
}

function MacroRing({value,max,color,label,unit="g"}){
  const pct=Math.min(value/max,1),r=28,circ=2*Math.PI*r;
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
      <svg width={70} height={70} style={{transform:"rotate(-90deg)"}}>
        <circle cx={35} cy={35} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={6}/>
        <circle cx={35} cy={35} r={r} fill="none" stroke={color} strokeWidth={6}
          strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap="round"
          style={{transition:"stroke-dashoffset 0.6s ease"}}/>
      </svg>
      <div style={{marginTop:-60,height:70,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
        <div style={{fontSize:16,fontWeight:800,color,fontFamily:"'Bebas Neue',sans-serif",lineHeight:1}}>{value}</div>

      <div style={{fontSize:9,color:"#666",letterSpacing:0.5,textTransform:"uppercase",marginTop:-4}}>{label}</div>
    </div>
  );
}

function CircleTimer({seconds,total,color,size=220}){
  const r=(size/2)-14,circ=2*Math.PI*r,pct=total>0?seconds/total:0,offset=circ*(1-pct);
  const warn=seconds<=10&&seconds>0,done=seconds===0;
  return(
    <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={10}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={done?"#4BDE80":warn?"#FF6B4A":color}
        strokeWidth={10} strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
        style={{transition:"stroke-dashoffset 0.9s linear,stroke 0.3s ease"}}/>
    </svg>
  );
}

}

/* ── BARCODE SCANNER ── */
function BarcodeScanner({onScan, onClose}){
  const containerRef = useRef(null);
  const [status, setStatus] = useState("Loading scanner…");
  const startedRef = useRef(false);

  useEffect(()=>{
    if(startedRef.current) return;
    startedRef.current = true;

    function initQuagga(){
      if(!containerRef.current) return;
      setStatus("Starting camera…");
      window.Quagga.init({
        inputStream:{
          name:"Live", type:"LiveStream", target:containerRef.current,
          constraints:{facingMode:"environment",width:{ideal:1280},height:{ideal:720}}
        },
        locator:{patchSize:"medium",halfSample:true},
        numOfWorkers:2, frequency:8,
        decoder:{readers:["ean_reader","upc_reader","upc_e_reader","ean_8_reader"]},
        locate:true
      },(err)=>{
        if(err){ setStatus("Camera error — allow camera access"); return; }
        window.Quagga.start();
        setStatus("Point at barcode");
      });

      let lastCode=null, lastTime=0;
      window.Quagga.onDetected((r)=>{
        const code=r.codeResult.code, now=Date.now();
        if(code===lastCode&&now-lastTime<2000) return;
        lastCode=code; lastTime=now;
        window.Quagga.stop();
        onScan(code);
      });
    }

    if(window.Quagga){ initQuagga(); return; }
    const s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js";
    s.onload=initQuagga;
    s.onerror=()=>setStatus("Failed to load scanner library");
    document.head.appendChild(s);

    return ()=>{ try{ if(window.Quagga) window.Quagga.stop(); }catch(e){} };
  },[]);

  return(
    <div style={{position:"fixed",inset:0,background:"#000",zIndex:600,display:"flex",flexDirection:"column"}}>
      <div id="quagga-scanner" ref={containerRef} style={{flex:1,position:"relative",overflow:"hidden"}}>
        {/* Aim overlay */}
        <div style={{position:"absolute",inset:0,zIndex:10,pointerEvents:"none",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{width:"72%",height:110,border:"2px solid #4BDE80",borderRadius:10,
            boxShadow:"0 0 0 9999px rgba(0,0,0,0.55)"}}/>
        </div>
      </div>
      <div style={{padding:"18px 20px",paddingBottom:"max(env(safe-area-inset-bottom),18px)",background:"rgba(0,0,0,0.95)",textAlign:"center"}}>
        <div style={{fontSize:14,fontWeight:600,color:"#4BDE80",marginBottom:14}}>{status}</div>
        <button onClick={()=>{try{if(window.Quagga)window.Quagga.stop();}catch(e){}onClose();}}
          style={{padding:"12px 36px",borderRadius:12,border:"1px solid rgba(255,255,255,0.15)",background:"rgba(255,255,255,0.06)",color:"#fff",fontFamily:"inherit",fontSize:14,cursor:"pointer",fontWeight:600}}>
          Cancel
        </button>
      </div>
    </div>
  );
}

  const logsForEx=setLogs[exIdx]||[];
  const setsHit=logsForEx.length;
  const targetSets=exercise?exercise.sets:0;
  const allSetsHit=setsHit>=targetSets;

  function beep(freq=880,dur=0.15,vol=0.3){try{if(!audioCtx.current)audioCtx.current=new(window.AudioContext||window.webkitAudioContext)();const ctx=audioCtx.current,osc=ctx.createOscillator(),gain=ctx.createGain();osc.connect(gain);gain.connect(ctx.destination);osc.frequency.value=freq;gain.gain.setValueAtTime(vol,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);osc.start();osc.stop(ctx.currentTime+dur);}catch(e){}}
  function tripleBeep(){beep(660,0.1,0.25);setTimeout(()=>beep(660,0.1,0.25),150);setTimeout(()=>beep(880,0.2,0.4),300);}

  useEffect(()=>{if(screen!=="session"){clearInterval(elapsedRef.current);return;}elapsedRef.current=setInterval(()=>setElapsed(e=>e+1),1000);return()=>clearInterval(elapsedRef.current);},[screen]);
  useEffect(()=>{clearInterval(restRef.current);if(phase!=="resting")return;restRef.current=setInterval(()=>{setRestSec(s=>{if(s<=1){clearInterval(restRef.current);tripleBeep();if(navigator.vibrate)navigator.vibrate([200,100,200,100,400]);setPhase("ready");return 0;}if(s===11)beep(440,0.08,0.15);return s-1;});},1000);return()=>clearInterval(restRef.current);},[phase]);

  function startSession(dayIdx){setSelectedDay(dayIdx);setExIdx(0);setPhase("ready");setSetLogs({});setElapsed(0);setInputReps("");setInputWeight("");setScreen("session");if(navigator.vibrate)navigator.vibrate(100);}
  function logSet(){const reps=inputReps||exercise.reps,weight=inputWeight||"BW";setSetLogs(prev=>({...prev,[exIdx]:[...(prev[exIdx]||[]),{reps,weight,time:elapsed}]}));setInputReps("");setInputWeight("");beep(660,0.12,0.3);if(navigator.vibrate)navigator.vibrate(60);const rd=customRest||exercise.rest;setRestTotal(rd);setRestSec(rd);setPhase("resting");}
  function skipRest(){clearInterval(restRef.current);setPhase("ready");setRestSec(0);beep(440,0.08);}
  function addRest(s){setRestSec(r=>r+s);setRestTotal(t=>t+s);}
  function nextExercise(){if(exIdx<workout.exercises.length-1){setExIdx(i=>i+1);setPhase("ready");clearInterval(restRef.current);beep(550,0.15,0.3);}else finishSession();}

  function finishSession(){
    clearInterval(elapsedRef.current);clearInterval(restRef.current);
    const total=Object.values(setLogs).reduce((a,v)=>a+v.length,0);
    const exData=workout.exercises.map((ex,i)=>({name:ex.name,targetSets:ex.sets,completed:(setLogs[i]||[]).length,sets:setLogs[i]||[]}));
    setSummary({day:workout.day,focus:workout.focus,color:workout.color,duration:elapsed,totalSets:total,exercises:exData,date:new Date().toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})});
    onSave&&onSave({id:Date.now(),date:new Date().toISOString(),day:workout.day,focus:workout.focus,color:workout.color,tag:workout.tag,duration:elapsed,totalSets:total,exercises:exData});
    setScreen("summary");tripleBeep();if(navigator.vibrate)navigator.vibrate([300,100,300,100,600]);
  }

  const progressPct=workout?((exIdx+setsHit/targetSets)/workout.exercises.length)*100:0;
  const warn10=phase==="resting"&&restSec<=10&&restSec>0;
  const restDone=phase==="resting"&&restSec===0;

  if(screen==="select")return(
    <div style={{height:"100%",overflowY:"auto",background:"#080c10",paddingBottom:32}}>
      <div style={{padding:"max(env(safe-area-inset-top),16px) 20px 0"}}>
        <button onClick={onBack} style={{background:"rgba(255,255,255,0.06)",border:"none",color:"#aaa",borderRadius:10,padding:"8px 14px",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:600,marginBottom:20}}>← Hub</button>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:11,letterSpacing:4,color:"#3a5a6a",marginBottom:6}}>WORKOUT TIMER</div>
          <div style={{fontFamily:"'Oswald',sans-serif",fontSize:32,fontWeight:700,color:"#fff",letterSpacing:1,lineHeight:1.1}}>SELECT<br/><span style={{color:"#4A9EFF"}}>WORKOUT</span></div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {WORKOUTS.map((w,i)=>(
            <button key={i} onClick={()=>startSession(i)} style={{background:`linear-gradient(120deg,${w.color}18 0%,rgba(255,255,255,0.02) 100%)`,border:`1px solid ${w.color}40`,borderRadius:18,padding:"20px",cursor:"pointer",textAlign:"left",fontFamily:"inherit",width:"100%"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:10,color:w.color,letterSpacing:2,fontWeight:700,marginBottom:6,textTransform:"uppercase"}}>{w.tag} · {w.day}</div>
                  <div style={{fontFamily:"'Oswald',sans-serif",fontSize:24,fontWeight:600,color:"#fff"}}>{w.focus}</div>
                  <div style={{fontSize:12,color:"#3a5a6a",marginTop:4}}>{w.exercises.length} exercises</div>
                </div>
                <div style={{width:48,height:48,borderRadius:14,background:w.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0,color:"#000",fontWeight:700}}>▶</div>
              </div>
            </button>
          ))}
        </div>
      </div>
    </div>
  );

  if(screen==="summary"&&summary)return(
    <div style={{height:"100%",overflowY:"auto",background:"#080c10",paddingBottom:40}}>
      <div style={{background:`linear-gradient(160deg,${summary.color}25 0%,#080c10 60%)`,padding:"max(env(safe-area-inset-top),40px) 20px 28px",textAlign:"center"}}>
        <div style={{fontSize:48,marginBottom:12}}>🏆</div>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:11,letterSpacing:4,color:summary.color,marginBottom:6}}>SESSION COMPLETE</div>
        <div style={{fontFamily:"'Oswald',sans-serif",fontSize:28,fontWeight:700,color:"#fff"}}>{summary.focus}</div>
        <div style={{fontSize:12,color:"#3a5a6a",marginTop:4}}>{summary.date}</div>
        <div style={{display:"flex",justifyContent:"center",gap:28,marginTop:24}}>
          {[{l:"Duration",v:fmtDur(summary.duration),c:"#4A9EFF"},{l:"Sets",v:summary.totalSets,c:summary.color},{l:"Exercises",v:summary.exercises.filter(e=>e.completed>0).length,c:"#4BDE80"}].map(s=>(
            <div key={s.l} style={{textAlign:"center"}}>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:32,color:s.c,lineHeight:1}}>{s.v}</div>
              <div style={{fontSize:10,color:"#3a5a6a",letterSpacing:1,marginTop:2}}>{s.l.toUpperCase()}</div>
            </div>
          ))}
        </div>
      </div>
      <div style={{padding:"0 20px"}}>
        {summary.exercises.map((ex,i)=>(
          <div key={i} style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:14,padding:"14px 16px",marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:ex.sets.length>0?10:0}}>
              <div style={{fontSize:13,fontWeight:600,color:ex.completed>=ex.targetSets?"#4BDE80":"#aaa"}}>{ex.name}</div>
              <div style={{fontSize:12,fontWeight:700,color:ex.completed>=ex.targetSets?summary.color:"#555"}}>{ex.completed}/{ex.targetSets}</div>
            </div>
            {ex.sets.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:6}}>{ex.sets.map((s,j)=><div key={j} style={{background:"rgba(255,255,255,0.04)",borderRadius:8,padding:"4px 10px",fontSize:11,color:"#aaa"}}>S{j+1}: <span style={{color:"#fff",fontWeight:700}}>{s.weight}</span>×<span style={{color:summary.color,fontWeight:700}}>{s.reps}</span></div>)}</div>}
          </div>
        ))}
        <div style={{display:"flex",gap:10,marginTop:16}}>
          <button onClick={()=>setScreen("select")} style={{flex:1,padding:"14px",borderRadius:14,border:`1px solid ${summary.color}40`,background:`${summary.color}18`,color:summary.color,cursor:"pointer",fontFamily:"inherit",fontWeight:800,fontSize:14}}>New Workout</button>
          <button onClick={onBack} style={{flex:1,padding:"14px",borderRadius:14,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.04)",color:"#aaa",cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:13}}>← Hub</button>
        </div>
      </div>
    </div>
  );

  /* SESSION SCREEN */
  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:"#080c10",maxWidth:480,margin:"0 auto"}}>
      <div style={{padding:"max(env(safe-area-inset-top),14px) 20px 0",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <button onClick={()=>setScreen("select")} style={{background:"rgba(255,255,255,0.05)",border:"none",color:"#3a5a6a",borderRadius:10,padding:"8px 12px",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:600}}>← Exit</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:13,letterSpacing:2,color:"#3a5a6a"}}>{workout.focus.toUpperCase()}</div>
          <div style={{fontSize:11,color:"#4A9EFF",fontWeight:700}}>⏱ {fmtTime(elapsed)}</div>
        </div>
        <button onClick={finishSession} style={{background:"rgba(75,222,128,0.12)",border:"1px solid rgba(75,222,128,0.25)",color:"#4BDE80",borderRadius:10,padding:"8px 12px",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700}}>Finish</button>
      </div>
      <div style={{padding:"10px 20px 0",flexShrink:0}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
          <span style={{fontSize:10,color:"#3a5a6a"}}>PROGRESS</span>
          <span style={{fontSize:10,color:workout.color,fontWeight:700}}>{exIdx+1}/{workout.exercises.length}</span>
        </div>
        <div style={{height:4,background:"rgba(255,255,255,0.06)",borderRadius:2,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${progressPct}%`,background:workout.color,borderRadius:2,transition:"width 0.4s ease"}}/>
        </div>
      </div>
      <div style={{padding:"12px 20px 0",display:"flex",gap:10,alignItems:"center",flexShrink:0}}>
        <button onClick={()=>{if(exIdx>0){setExIdx(i=>i-1);setPhase("ready");clearInterval(restRef.current);}}} disabled={exIdx===0} style={{width:36,height:36,borderRadius:10,border:"none",background:"rgba(255,255,255,0.05)",color:exIdx===0?"#222":"#aaa",cursor:exIdx===0?"default":"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>‹</button>
        <div style={{flex:1,textAlign:"center"}}>
          {exercise.priority&&<div style={{fontSize:9,fontWeight:700,letterSpacing:1,color:workout.color,marginBottom:3}}>★ PRIORITY</div>}
          <div style={{fontFamily:"'Oswald',sans-serif",fontSize:20,fontWeight:600,color:"#fff",lineHeight:1.2}}>{exercise.name}</div>
          <div style={{fontSize:11,color:"#3a5a6a",marginTop:3}}>{exercise.reps} reps · {exercise.rest}s rest</div>
        </div>
        <button onClick={nextExercise} style={{width:36,height:36,borderRadius:10,border:"none",background:"rgba(255,255,255,0.05)",color:"#aaa",cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>›</button>
      </div>
      <div style={{padding:"10px 20px 0",display:"flex",justifyContent:"center",gap:8,flexShrink:0}}>
        {Array.from({length:targetSets},(_,i)=>(
          <div key={i} style={{width:i<setsHit?30:26,height:i<setsHit?30:26,borderRadius:"50%",background:i<setsHit?workout.color:"rgba(255,255,255,0.07)",border:`2px solid ${i<setsHit?workout.color:"rgba(255,255,255,0.1)"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:i<setsHit?"#000":"#333",transition:"all 0.3s"}}>
            {i<setsHit?"✓":i+1}
          </div>
        ))}
      </div>
      {logsForEx.length>0&&(
        <div style={{padding:"8px 20px 0",flexShrink:0}}>
          <div style={{display:"flex",gap:5,justifyContent:"center",flexWrap:"wrap"}}>
            {logsForEx.map((s,i)=><div key={i} style={{background:"rgba(255,255,255,0.04)",borderRadius:8,padding:"3px 9px",fontSize:11,border:`1px solid ${workout.color}30`}}><span style={{color:"#777"}}>S{i+1}:</span> <span style={{color:"#fff",fontWeight:700}}>{s.weight}</span>×<span style={{color:workout.color,fontWeight:700}}>{s.reps}</span></div>)}
          </div>
        </div>
      )}
      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"16px 20px"}}>
        {phase==="resting"?(
          <div className="ringpop" style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
            <div style={{position:"relative",display:"flex",alignItems:"center",justifyContent:"center"}}>
              <CircleTimer seconds={restSec} total={restTotal} color={workout.color} size={200}/>
              <div style={{position:"absolute",textAlign:"center"}}>
                <div style={{fontSize:10,letterSpacing:2,color:"#3a5a6a",marginBottom:2}}>REST</div>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:52,lineHeight:1,color:warn10?"#FF6B4A":restDone?"#4BDE80":"#fff",transition:"color 0.3s"}}>{fmtTime(restSec)}</div>
                {warn10&&<div className="pulse" style={{fontSize:11,color:"#FF6B4A",marginTop:3,fontWeight:700}}>GET READY</div>}
                {restDone&&<div className="pop" style={{fontSize:11,color:"#4BDE80",marginTop:3,fontWeight:700}}>GO! 💪</div>}
              </div>
            </div>
            <div style={{display:"flex",gap:8,marginTop:14}}>
              <button onClick={()=>addRest(15)} style={{padding:"8px 14px",borderRadius:10,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.05)",color:"#aaa",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:600}}>+15s</button>
              <button onClick={()=>addRest(30)} style={{padding:"8px 14px",borderRadius:10,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.05)",color:"#aaa",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:600}}>+30s</button>
              <button onClick={skipRest} style={{padding:"8px 16px",borderRadius:10,border:`1px solid ${workout.color}50`,background:`${workout.color}18`,color:workout.color,cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700}}>Skip →</button>
            </div>
          </div>
        ):(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:16,width:"100%"}}>
            {!allSetsHit?(
              <>
                <div style={{display:"flex",gap:10,width:"100%",maxWidth:300}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:10,color:"#3a5a6a",letterSpacing:1,marginBottom:4,textAlign:"center"}}>WEIGHT (lbs)</div>
                    <input type="number" placeholder="e.g. 45" value={inputWeight} onChange={e=>setInputWeight(e.target.value)}
                      style={{width:"100%",padding:"12px",borderRadius:12,border:`1px solid ${workout.color}30`,background:"rgba(255,255,255,0.05)",color:"#fff",fontSize:20,fontFamily:"'Bebas Neue',sans-serif",textAlign:"center",outline:"none"}}/>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:10,color:"#3a5a6a",letterSpacing:1,marginBottom:4,textAlign:"center"}}>REPS</div>
                    <input type="number" placeholder={exercise.reps} value={inputReps} onChange={e=>setInputReps(e.target.value)}
                      style={{width:"100%",padding:"12px",borderRadius:12,border:`1px solid ${workout.color}30`,background:"rgba(255,255,255,0.05)",color:"#fff",fontSize:20,fontFamily:"'Bebas Neue',sans-serif",textAlign:"center",outline:"none"}}/>
                  </div>
                </div>
                <button onClick={logSet} style={{width:"100%",maxWidth:300,padding:"20px",borderRadius:18,border:"none",background:workout.color,color:"#000",cursor:"pointer",fontFamily:"'Oswald',sans-serif",fontSize:22,fontWeight:700,letterSpacing:1,boxShadow:`0 8px 32px ${workout.color}50`}}>
                  ✓ SET {setsHit+1} DONE
                </button>
              </>
            ):(
              <div className="pop" style={{display:"flex",flexDirection:"column",alignItems:"center",gap:14}}>
                <div style={{width:80,height:80,borderRadius:"50%",background:"rgba(75,222,128,0.15)",border:"2px solid #4BDE80",display:"flex",alignItems:"center",justifyContent:"center",fontSize:36}}>✓</div>
                <div style={{fontFamily:"'Oswald',sans-serif",fontSize:22,fontWeight:600,color:"#4BDE80"}}>Exercise Done!</div>
                <button onClick={nextExercise} style={{padding:"16px 36px",borderRadius:14,border:"none",background:workout.color,color:"#000",cursor:"pointer",fontFamily:"'Oswald',sans-serif",fontSize:18,fontWeight:700,letterSpacing:1}}>
                  {exIdx<workout.exercises.length-1?"Next Exercise →":"Finish Session 🏆"}
                </button>
              </div>
            )}
            <div style={{width:"100%",maxWidth:300,background:"rgba(255,255,255,0.03)",borderRadius:12,padding:"11px 14px",border:"1px solid rgba(255,255,255,0.06)"}}>
              <div style={{fontSize:10,color:"#3a5a6a",letterSpacing:1,marginBottom:6,textAlign:"center"}}>REST TIMER</div>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <button onClick={()=>setCustomRest(r=>Math.max(15,r-15))} style={{width:32,height:32,borderRadius:8,border:"none",background:"rgba(255,255,255,0.07)",color:"#aaa",cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                <div style={{flex:1,textAlign:"center",fontFamily:"'Bebas Neue',sans-serif",fontSize:24,color:"#fff"}}>{customRest}s</div>
                <button onClick={()=>setCustomRest(r=>r+15)} style={{width:32,height:32,borderRadius:8,border:"none",background:"rgba(255,255,255,0.07)",color:"#aaa",cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
              </div>
              <div style={{display:"flex",gap:5,marginTop:6,justifyContent:"center"}}>
                {[45,60,90,120].map(t=>(
                  <button key={t} onClick={()=>setCustomRest(t)} style={{padding:"4px 10px",borderRadius:6,border:`1px solid ${customRest===t?workout.color+"60":"rgba(255,255,255,0.07)"}`,background:customRest===t?`${workout.color}18`:"transparent",color:customRest===t?workout.color:"#555",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:600}}>{t}s</button>
                ))}
              </div>
            </div>
          </div>
        )}
      </div>
      <div style={{padding:"0 16px",paddingBottom:"max(env(safe-area-inset-bottom),16px)",flexShrink:0}}>
        <div style={{display:"flex",gap:5,overflowX:"auto",paddingBottom:4}}>
          {workout.exercises.map((ex,i)=>{
            const done=(setLogs[i]||[]).length,complete=done>=ex.sets,active=i===exIdx;
            return<button key={i} onClick={()=>{setExIdx(i);setPhase("ready");clearInterval(restRef.current);}} style={{flexShrink:0,padding:"7px 9px",borderRadius:9,border:`1px solid ${active?workout.color:complete?"rgba(75,222,128,0.3)":"rgba(255,255,255,0.06)"}`,background:active?`${workout.color}20`:complete?"rgba(75,222,128,0.07)":"rgba(255,255,255,0.02)",color:active?workout.color:complete?"#4BDE80":"#555",cursor:"pointer",fontFamily:"inherit",fontSize:9,fontWeight:600,minWidth:64,textAlign:"center"}}>
              <div style={{marginBottom:2}}>{complete?"✓":active?"▶":`${done}/${ex.sets}`}</div>
              <div style={{fontSize:8,overflow:"hidden",maxWidth:64,whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{ex.name.split(" ").slice(0,2).join(" ")}</div>
            </button>;
          })}
        </div>
      </div>
    </div>
  );
}

/* ── MISC HELPERS ── */
const fmt      = n => (n == null ? '—' : Math.round(n));
const dayLabel = d => { try { return new Date(d + 'T12:00').toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'}); } catch { return d; } };

/* ══════════════════════════════════════════════════
   FITNESS HUB — MAIN APP COMPONENT
══════════════════════════════════════════════════ */
function FitnessHub() {

  /* ── persistent state ── */
  const [entries,    setEntries]    = useState(() => load('entries_' + todayStr(), []));
  const [saved,      setSaved]      = useState(() => load('savedRecipes', []));
  const [mealPlan,   setMealPlan]   = useState(() => load('mealPlan', {}));
  const [shopList,   setShopList]   = useState(() => load('shopList', []));

  const [userGoal,   setUserGoal]   = useState(() => load('userGoal', 'recomp'));
  const [weekBudget, setWeekBudget] = useState(() => load('weekBudget', 150));
  const [grocLog,    setGrocLog]    = useState(() => load('grocLog', []));
  const [apiKey,     setApiKey]     = useState(() => load('claudeKey', ''));
  const [vercelUrl,  setVercelUrl]  = useState(() => load('vercelUrl', ''));
  const [vaultName,  setVaultName]  = useState(() => load('vaultName', ''));

  /* ── ephemeral UI ── */
  const [screen,       setScreen]       = useState('home');
  const [trainTab,     setTrainTab]     = useState('today');
  const [shopTab,      setShopTab]      = useState('list');
  const [showSettings, setShowSettings] = useState(false);
  const [showBarcode,  setShowBarcode]  = useState(false);
  const [lookingUpFood, setLookingUpFood] = useState(false);
  const [swappingRecipe, setSwappingRecipe] = useState(false);
  const [recipeSwaps,   setRecipeSwaps]   = useState(null);
  const [toast,        setToast]        = useState(null);
  const [badge,        setBadge]        = useState(null);

  /* ── food logger ── */
  const [logItem,     setLogItem]     = useState('');
  const [logCal,      setLogCal]      = useState('');
  const [logPro,      setLogPro]      = useState('');
  const [logCarb,     setLogCarb]     = useState('');
  const [logFat,      setLogFat]      = useState('');
  const [barcodeData, setBarcodeData] = useState(null);

  /* ── cookbook ── */
  const [activeRecipe,  setActiveRecipe]  = useState(null);
  const [searchQ,       setSearchQ]       = useState('');
  const [onlineResults, setOnlineResults] = useState([]);
  const [searching,     setSearching]     = useState(false);
  const [importUrl,     setImportUrl]     = useState('');

  /* ── Progressive Overload Detector ── */
  function computeProgressiveOverload() {
    const byEx = {};
    vault.forEach(s => {
      (s.exercises || []).forEach(ex => {
        if (!byEx[ex.name]) byEx[ex.name] = [];
        byEx[ex.name].push({
          date: s.date,
          maxW: ex.maxWeight || Math.max(...(ex.sets || []).map(x => x.weight || 0), 0),
          vol:  (ex.sets || []).reduce((t, x) => t + (x.weight || 0) * (x.reps || 0), 0),
          done: ex.completedSets || (ex.sets || []).length,
          tgt:  ex.targetSets   || (ex.sets || []).length || 0
        });
      });
    });
    const insights = [];
    Object.entries(byEx).forEach(([name, arr]) => {
      if (arr.length < 2) return;
      arr.sort((a, b) => a.date.localeCompare(b.date));
      const last = arr[arr.length - 1], prev = arr[arr.length - 2];
      if (last.maxW > 0 && last.maxW === prev.maxW) {
        const n = arr.filter(x => x.maxW === last.maxW).length;
        insights.push({ type: 'plateau', exercise: name, msg: `Stuck at ${last.maxW}lb for ${n} sessions. Try +5lb or drop to 60% and rebuild.` });
      }
      if (prev.vol > 0 && last.vol < prev.vol * 0.85) {
        const drop = Math.round((1 - last.vol / prev.vol) * 100);
        insights.push({ type: 'drop', exercise: name, msg: `Volume dropped ${drop}% last session. Reduce load 10% or check recovery.` });
      }
      if (last.tgt > 0 && last.done < last.tgt) {
        insights.push({ type: 'missed', exercise: name, msg: `Missed ${last.tgt - last.done} set(s). Try shorter rest or reduce weight 5%.` });
      }
      if (arr.length >= 3) {
        const t3 = arr.slice(-3);
        if (t3.every(x => x.done >= x.tgt) && last.maxW > prev.maxW) {
          insights.push({ type: 'progress', exercise: name, msg: `Up to ${last.maxW}lb — great progress! Add weight again next session if 3 clean sets.` });
        }
      }
    });
    return insights;
  }

  function cleanSearchQuery(q) {
    // Strip common qualifiers TheMealDB won't understand
    const strip = ['high protein','low calorie','low carb','healthy','easy','quick','simple',
      'homemade','best','keto','paleo','vegan','vegetarian','gluten free','dairy free',
      'macro friendly','bodybuilder','bulking','cutting','meal prep'];
    let cleaned = q.toLowerCase();
    strip.forEach(w => { cleaned = cleaned.replace(w, ''); });
    return cleaned.replace(/\s+/g, ' ').trim();
  }

  async function searchRecipes() {
    if (!searchQ.trim()) return;
    setSearching(true); setOnlineResults([]);
    try {
      // Try 1: exact query
      let meals = await tryMDBSearch(searchQ.trim());
      // Try 2: cleaned query (strip qualifiers like "high protein")
      if (!meals.length) {
        const cleaned = cleanSearchQuery(searchQ);
        if (cleaned && cleaned !== searchQ.toLowerCase()) meals = await tryMDBSearch(cleaned);
      }
      // Try 3: last 1-2 meaningful words
      if (!meals.length) {
        const words = cleanSearchQuery(searchQ).split(' ').filter(w => w.length > 2);
        if (words.length > 1) meals = await tryMDBSearch(words.slice(-2).join(' '));
        if (!meals.length && words.length) meals = await tryMDBSearch(words[words.length - 1]);
      }

      if (meals.length) {
        setOnlineResults(meals);
      } else if (apiKey) {
        // Try 4: Claude web-search agent finds & builds 3 real recipes
        showToast('🔍 AI searching the web for recipes…', 'info');
        const webRecipes = await buildRecipeFromWebSearch(searchQ);
        if (webRecipes?.length) {
          setOnlineResults(webRecipes);
          showToast(`🌐 Found ${webRecipes.length} recipes!`, 'success');
        } else {
          // Try 5: pure Claude generation — 3 distinct variations
          const aiRecipes = await generateRecipeWithClaude(searchQ);
          if (aiRecipes?.length) {
            setOnlineResults(Array.isArray(aiRecipes) ? aiRecipes : [aiRecipes]);
            showToast(`🤖 AI built ${Array.isArray(aiRecipes) ? aiRecipes.length : 1} recipes for you!`, 'info');
          } else showToast('Nothing found', 'error');
        }
      } else {
        showToast('No results — add Claude API key in Settings for AI recipes', 'error');
      }
    } catch { showToast('Search failed', 'error'); }
    setSearching(false);
  }

  function buildMDBIngredients(m) {
    const list = [];
    for (let i = 1; i <= 20; i++) {
      const ing = m[`strIngredient${i}`], meas = m[`strMeasure${i}`];
      if (ing && ing.trim()) {
        const parts = (meas || '').trim().split(' ');
        list.push({ item: ing.trim(), qty: parseFloat(parts[0]) || 1, unit: parts.slice(1).join(' ') || 'each' });
      }
    }
    return list;
  }

  async function enrichRecipeWithMacros(recipe) {
    if (recipe.calories && recipe.calories > 0) return recipe;
    const ingList = (recipe.ingredients || []).slice(0, 12).map(i => `${i.qty} ${i.unit} ${i.item}`).join(', ');
    const text = await callClaude([{ role: 'user', content:
      `Estimate macros per serving for this recipe (${recipe.baseServings || 2} servings total):\n${ingList}\n\nRespond with ONLY valid JSON, no extra text: {"calories":0,"protein":0,"carbs":0,"fat":0}`
    }], 120);
    if (text) {
      try {
        const m = JSON.parse(text.match(/\{[^}]+\}/)?.[0] || '{}');
        return { ...recipe, ...m };
      } catch {}
    }
    return recipe;
  }

      });
      if (!r.ok) throw new Error('Server error');
      const recipe = await r.json();
      if (recipe?.name) {
        const full = { ...recipe, id: 'import_' + Date.now(), source: 'import', baseServings: recipe.servings || 2 };
        setSaved(p => [full, ...p]);
        setImportUrl('');
        showToast(`Imported: ${recipe.name}`, 'success');
      } else { showToast('Could not extract recipe', 'error'); }
    } catch { showToast('Import failed — check Vercel URL', 'error'); }
    setImporting(false);
  }

  /* ── Meal Planner ── */
  function getPlanWeekDates() {
    const now = new Date();
    const mon = new Date(now);
    mon.setDate(now.getDate() - ((now.getDay() + 6) % 7) + planWeekOffset * 7);
    return Array.from({ length: 7 }, (_, i) => {
      const d = new Date(mon); d.setDate(mon.getDate() + i);
      return d.toISOString().slice(0, 10);
    });
  }

  function addToPlan(dateStr, recipe) {
    setMealPlan(p => ({ ...p, [dateStr]: [...(p[dateStr] || []), { recipeId: recipe.id, name: recipe.name, servings: 1 }] }));
    showToast(`Added to ${dayLabel(dateStr)}`, 'success');
  }

  function removeFromPlan(dateStr, idx) {
    setMealPlan(p => ({ ...p, [dateStr]: (p[dateStr] || []).filter((_, i) => i !== idx) }));
  }

  async function generateMealPlan() {
    setGenLoading(true);
    const recipeSummary = saved.slice(0, 20).map(r =>
      `${r.name}: ${r.calories || 0}cal / ${r.protein || 0}g protein / $${estimateRecipeCost(r).toFixed(2)} per serving`
    ).join('\n');
    await callClaude([{ role: 'user', content:
      `Create a 7-day meal plan for Drew (${goal.label}: ${goal.cal} cal/day, ${goal.protein}g protein, $${weekBudget}/week budget).\n\nAvailable recipes:\n${recipeSummary || 'No saved recipes — use common high-protein budget meals'}\n\nFormat:\nDay 1: [Meal 1], [Meal 2], [Meal 3]\n...\n\nTarget ${goal.cal} calories and ${goal.protein}g protein per day. Budget $${(weekBudget / 7).toFixed(0)}/day max.`
    }], 600);
    showToast('Meal plan ready — add recipes to planner manually', 'success');
    setGenLoading(false);
  }

  /* ── Shopping List ── */
  function buildShoppingFromPlan() {
    const items = {};
    getPlanWeekDates().forEach(d => {
      (mealPlan[d] || []).forEach(m => {
        const recipe = saved.find(r => r.id === m.recipeId);
        if (!recipe) return;
        (recipe.ingredients || []).forEach(ing => {
          const k = ing.item.toLowerCase();
          if (!items[k]) items[k] = { item: ing.item, qty: 0, unit: ing.unit, cost: 0 };
          items[k].qty  += ing.qty * (m.servings || 1);
          items[k].cost += estimateIngredientCost(ing.item, ing.qty * (m.servings || 1), ing.unit);
        });
      });
    });
    const list = Object.values(items).map((v, i) => ({
      id: Date.now() + i,
      text: `${v.item} — ${v.qty % 1 === 0 ? v.qty : v.qty.toFixed(1)} ${v.unit}`,
      item: v.item, qty: v.qty, unit: v.unit,
      estCost: Math.round(v.cost * 100) / 100, checked: false
    }));
    setShopList(list);
    showToast(`Generated ${list.length} items`, 'success');
  }

  function toggleShopItem(id) {
    setShopList(p => p.map(i => i.id === id ? { ...i, checked: !i.checked } : i));
  }

  function addManualShopItem(text) {
    if (!text.trim()) return;
    setShopList(p => [...p, { id: Date.now(), text: text.trim(), estCost: 0, checked: false }]);
  }

  function addGrocerySpend(amount, note) {
    setGrocLog(p => [...p, { id: Date.now(), date: todayStr(), amount: parseFloat(amount) || 0, note }]);
  }

  /* ── Obsidian Export ── */
  function generateDailyLog() {
    return `# Daily Log — ${todayStr()}\n\n## Nutrition\n- **Calories:** ${fmt(todayCal)} / ${goal.cal}\n- **Protein:** ${fmt(todayPro)}g / ${goal.protein}g\n- **Carbs:** ${fmt(todayCarb)}g / ${goal.carbs}g\n- **Fat:** ${fmt(todayFat)}g / ${goal.fat}g\n\n## Food Entries\n${entries.map(e => `- ${e.time} — **${e.name}**: ${e.cal} cal · ${e.protein}g P · ${e.carbs}g C · ${e.fat}g F${e.recipeCost ? ` · $${e.recipeCost.toFixed(2)}` : ''}`).join('\n') || '- No entries'}\n\n## Goal: ${goal.emoji} ${goal.label}\n> ${goal.desc}\n\n---\n*Exported from Drew's Fitness Hub*\n`;
  }

  function generateWorkoutMd(session) {
    const lines = (session.exercises || []).map(ex => {
      const sets = (ex.sets || []).map((s, i) => `  - Set ${i + 1}: ${s.weight || 0} lb x ${s.reps || 0} reps`).join('\n');
      return `### ${ex.name}\n${sets}`;
    }).join('\n\n');
    return `# Workout — ${session.date}\n**${session.workout}**\nDuration: ${Math.floor((session.duration || 0) / 60)}m ${(session.duration || 0) % 60}s\n\n${lines}\n\n---\n*Logged in Drew's Fitness Hub*\n`;
  }

  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

  /* ── Desktop export: File System Access API ── */
  async function exportToObsidianDesktop() {
    try {
      const dir = await window.showDirectoryPicker({ mode: 'readwrite' });
      const mkDir = async (parent, name) => { try { return await parent.getDirectoryHandle(name, { create: true }); } catch { return parent; } };
      const logsDir = await mkDir(dir, 'Daily Logs');
      const lf = await logsDir.getFileHandle(`${todayStr()}.md`, { create: true });
      const lw = await lf.createWritable(); await lw.write(generateDailyLog()); await lw.close();
      if (vault.length > 0) {
        const lastWo = vault[vault.length - 1];
        const woDir = await mkDir(dir, 'Workouts');
        const wf = await woDir.getFileHandle(`${lastWo.date}-${(lastWo.workout || 'workout').replace(/\s+/g, '-')}.md`, { create: true });
        const ww = await wf.createWritable(); await ww.write(generateWorkoutMd(lastWo)); await ww.close();
      }
      showToast('Exported to Obsidian vault! 📁', 'success');
    } catch (e) {
      if (e.name !== 'AbortError') showToast('Export failed', 'error');
    }
  }

  /* ── Mobile export: Obsidian URI deep-link ── */
  function exportToObsidianMobile(type = 'log') {
    const name = type === 'log'
      ? `Daily Logs/${todayStr()}`
      : vault.length > 0 ? `Workouts/${vault[vault.length-1].date}-workout` : `Workouts/${todayStr()}-workout`;
    const content = type === 'log' ? generateDailyLog() : (vault.length > 0 ? generateWorkoutMd(vault[vault.length-1]) : '# No workouts yet');
    const vn = vaultName.trim();
    const uri = `obsidian://new?${vn ? `vault=${encodeURIComponent(vn)}&` : ''}name=${encodeURIComponent(name)}&content=${encodeURIComponent(content)}`;
    window.location.href = uri;
    showToast('Opening Obsidian…', 'info');
  }

  /* ── Mobile export: Web Share API (share .md file) ── */
  async function shareAsMdFile(type = 'log') {
    const filename = type === 'log' ? `${todayStr()}-daily-log.md` : `${todayStr()}-workout.md`;
    const content  = type === 'log' ? generateDailyLog() : (vault.length > 0 ? generateWorkoutMd(vault[vault.length-1]) : '# No workouts yet');
    const file = new File([content], filename, { type: 'text/markdown' });
    if (navigator.canShare?.({ files: [file] })) {
      try { await navigator.share({ files: [file], title: filename }); }
      catch (e) { if (e.name !== 'AbortError') downloadMd(filename, content); }
    } else { downloadMd(filename, content); }
  }

  function downloadMd(filename, content) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([content], { type: 'text/markdown' }));
    a.download = filename; a.click();
    showToast('Downloaded!', 'success');
  }

  function exportToObsidian() {
    if (isMobile) { exportToObsidianMobile('log'); }
    else if ('showDirectoryPicker' in window) { exportToObsidianDesktop(); }
    else { downloadMd(`${todayStr()}-daily-log.md`, generateDailyLog()); }
  }

          </div>

            </div>

            {(activeRecipe.ingredients || []).length > 0 && (

            {activeRecipe.instructions && (() => {

              const steps = raw.split(/\n+/).flatMap(line =>
                line.split(/(?=\d+\.\s)/).map(s => s.trim())

              <button onClick={() => { addToPlan(todayStr(), activeRecipe); }} style={{ flex: 1, padding: 13, borderRadius: 13, border: '1px solid rgba(245,200,66,0.3)', background: 'rgba(245,200,66,0.08)', color: '#F5C842', fontFamily: "'Oswald',sans-serif", fontSize: 14, fontWeight: 700, cursor: 'pointer' }}>

            </div>

            {(!activeRecipe.calories || activeRecipe.calories === 0) && (
              <button onClick={async () => {

                setActiveRecipe(r);
                if (saved.find(s => s.id === r.id)) setSaved(p => p.map(s => s.id === r.id ? r : s));
              }} style={{ width: '100%', padding: 12, borderRadius: 12, border: '1px solid rgba(245,200,66,0.3)', background: 'rgba(245,200,66,0.08)', color: '#F5C842', fontFamily: "'Oswald',sans-serif", fontSize: 14, cursor: 'pointer', marginBottom: 8 }}>
                ✨ ESTIMATE MACROS WITH AI
              </button>
            )}

            <button onClick={() => { setRecipeSwaps(null); getProteinSwaps(activeRecipe); }}
              disabled={swappingRecipe}
              style={{ width: '100%', padding: 12, borderRadius: 12, border: '1px solid rgba(75,222,128,0.3)', background: swappingRecipe ? 'rgba(75,222,128,0.03)' : 'rgba(75,222,128,0.08)', color: '#4BDE80', fontFamily: "'Oswald',sans-serif", fontSize: 14, cursor: 'pointer', marginBottom: 8 }}>
              {swappingRecipe ? '🔄 FINDING SWAPS…' : '🔄 HIGH PROTEIN SWAPS (WALMART)'}
            </button>

            {recipeSwaps && (
              <div style={{ background: 'rgba(75,222,128,0.05)', border: '1px solid rgba(75,222,128,0.15)', borderRadius: 14, padding: 14, marginBottom: 8 }}>
                <div style={{ fontFamily: "'Oswald',sans-serif", fontSize: 13, color: '#4BDE80', letterSpacing: 1, marginBottom: 10 }}>💪 PROTEIN SWAP IDEAS</div>
                {recipeSwaps.map((s, i) => (
                  <div key={i} style={{ marginBottom: 10, paddingBottom: 10, borderBottom: i < recipeSwaps.length - 1 ? '1px solid rgba(255,255,255,0.05)' : 'none' }}>
                    <div style={{ fontSize: 12, color: '#fff', marginBottom: 3 }}>
                      <span style={{ color: '#aaa', textDecoration: 'line-through' }}>{s.original}</span>
                      <span style={{ color: '#4BDE80', margin: '0 6px' }}>→</span>
                      <span style={{ fontWeight: 600 }}>{s.swap}</span>
                    </div>
                    <div style={{ fontSize: 11, color: '#888', marginBottom: 2 }}>🛒 Walmart: <span style={{ color: '#aaa' }}>{s.walmartProduct}</span></div>
                    <div style={{ display: 'flex', gap: 8, fontSize: 11 }}>
                      {s.proteinChange && <span style={{ color: '#4A9EFF' }}>Protein: {s.proteinChange}</span>}
                      {s.calChange && <span style={{ color: '#FF6B4A' }}>Cals: {s.calChange}</span>}
                    </div>
                    {s.tip && <div style={{ fontSize: 11, color: '#666', marginTop: 2, fontStyle: 'italic' }}>{s.tip}</div>}
                  </div>
                ))}
              </div>
            )}
            <div style={{ height: 80 }} />
          </div>
        </div>
      );
    }

    return (
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        <div style={{ padding: '14px 16px', flexShrink: 0, borderBottom: '1px solid rgba(255,255,255,0.06)' }}>
          <div style={{ display: 'flex', gap: 8, marginBottom: 8 }}>
            <input value={searchQ} onChange={e => setSearchQ(e.target.value)} placeholder="Search online recipes…"
              style={{ flex: 1, padding: '10px 14px', borderRadius: 12, border: '1px solid rgba(255,255,255,0.1)', background: 'rgba(255,255,255,0.04)', color: '#fff', fontSize: 13, fontFamily: 'inherit', outline: 'none' }}
              onKeyDown={e => e.key === 'Enter' && searchRecipes()} />
            <button onClick={searchRecipes} disabled={searching} style={{ padding: '10px 16px', borderRadius: 12, border: 'none', background: '#4A9EFF', color: '#000', fontFamily: "'Oswald',sans-serif", fontSize: 13, fontWeight: 700, cursor: 'pointer' }}>
              {searching ? '…' : 'SEARCH'}
            </button>
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            <input value={importUrl} onChange={e => setImportUrl(e.target.value)} placeholder="Paste TikTok / Instagram / any URL…"
              style={{ flex: 1, padding: '9px 14px', borderRadius: 12, border: '1px solid rgba(255,255,255,0.08)', background: 'rgba(255,255,255,0.03)', color: '#fff', fontSize: 12, fontFamily: 'inherit', outline: 'none' }} />
            <button onClick={importFromUrl} disabled={importing} style={{ padding: '9px 14px', borderRadius: 12, border: '1px solid rgba(168,85,247,0.4)', background: 'rgba(168,85,247,0.1)', color: '#A855F7', fontFamily: "'Oswald',sans-serif", fontSize: 12, fontWeight: 700, cursor: 'pointer' }}>
              {importing ? '…' : 'IMPORT'}
            </button>
          </div>
        </div>

        <div style={{ flex: 1, overflowY: 'auto', padding: '10px 16px' }}>

            <div style={{ textAlign: 'center', padding: '60px 0', color: '#444' }}>
              <div style={{ fontSize: 40, marginBottom: 10 }}>📖</div>
              <div style={{ fontSize: 14, marginBottom: 6 }}>No recipes yet</div>
              <div style={{ fontSize: 12, color: '#333' }}>Search online or import from a URL above</div>
            </div>
          ) : allRecipes.map(r => {
            const cost = estimateRecipeCost(r);

            return (
              <div key={r.id} onClick={() => { setRecipeSwaps(null); setActiveRecipe(r); }} style={{ background: 'rgba(255,255,255,0.03)', borderRadius: 16, padding: 14, marginBottom: 10, border: `1px solid ${r.source === 'web' ? 'rgba(74,158,255,0.15)' : r.source === 'claude' ? 'rgba(168,85,247,0.15)' : 'rgba(255,255,255,0.06)'}`, cursor: 'pointer' }}>

                    <div style={{ fontSize: 14, fontWeight: 600, color: '#fff', marginBottom: 2 }}>{r.name}</div>
                    <div style={{ fontSize: 10, color: '#555' }}>{r.category}{r.area ? ` · ${r.area}` : ''}{(r.prepTime || r.cookTime) ? ` · ⏱ ${[r.prepTime, r.cookTime].filter(Boolean).join(' + ')}` : ''}</div>

                  <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 4 }}>
                    <StarRating id={r.id} ratings={ratings} setRatings={setRatings} size={12} />

                  {r.carbs > 0 && <span style={{ fontSize: 11, color: '#A855F7' }}>{r.carbs}g carbs</span>}

          })}
          <div style={{ height: 80 }} />
        </div>
      </div>
    );

  /* ── PLANNER ── */
  function PlannerScreen() {
    const weekDates  = getPlanWeekDates();
    const weekLabels = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
    const weekTotalCost = weekDates.reduce((tot, d) =>
      tot + (mealPlan[d] || []).reduce((s, m) => {
        const r = saved.find(x => x.id === m.recipeId);
        return s + (r ? estimateRecipeCost(r) * (m.servings || 1) : 0);
      }, 0), 0);

    return (
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        <div style={{ padding: '14px 16px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', borderBottom: '1px solid rgba(255,255,255,0.06)', flexShrink: 0 }}>
          <button onClick={() => setPlanWeekOffset(w => w - 1)} style={{ width: 30, height: 30, borderRadius: 8, border: '1px solid rgba(255,255,255,0.1)', background: 'transparent', color: '#aaa', cursor: 'pointer', fontSize: 18 }}>‹</button>
          <div style={{ textAlign: 'center' }}>
            <div style={{ fontFamily: "'Oswald',sans-serif", fontSize: 13, color: '#fff' }}>Week of {weekDates[0]}</div>
            <div style={{ fontSize: 11, color: '#4BDE80' }}>Est. week cost: ${weekTotalCost.toFixed(2)}</div>
          </div>
          <button onClick={() => setPlanWeekOffset(w => w + 1)} style={{ width: 30, height: 30, borderRadius: 8, border: '1px solid rgba(255,255,255,0.1)', background: 'transparent', color: '#aaa', cursor: 'pointer', fontSize: 18 }}>›</button>
        </div>

        <div style={{ flex: 1, overflowY: 'auto', padding: '10px 16px' }}>
          <button onClick={generateMealPlan} disabled={genLoading} style={{ width: '100%', padding: 12, borderRadius: 13, border: '1px solid rgba(74,158,255,0.3)', background: 'rgba(74,158,255,0.1)', color: '#4A9EFF', fontFamily: "'Oswald',sans-serif", fontSize: 14, fontWeight: 700, cursor: 'pointer', marginBottom: 14 }}>
            {genLoading ? '✨ Generating…' : '✨ AI SUGGEST WEEK PLAN'}
          </button>

          {weekDates.map((d, di) => {
            const dayMeals = mealPlan[d] || [];
            const dayCost  = dayMeals.reduce((s, m) => { const r = saved.find(x => x.id === m.recipeId); return s + (r ? estimateRecipeCost(r) * (m.servings || 1) : 0); }, 0);
            return (
              <div key={d} style={{ background: 'rgba(255,255,255,0.03)', borderRadius: 14, padding: 12, marginBottom: 8, border: '1px solid rgba(255,255,255,0.06)' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
                  <div style={{ display: 'flex', gap: 8, alignItems: 'baseline' }}>
                    <div style={{ fontFamily: "'Oswald',sans-serif", fontSize: 14, color: '#fff', fontWeight: 600 }}>{weekLabels[di]}</div>
                    <div style={{ fontSize: 10, color: '#555' }}>{d}</div>
                  </div>
                  <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
                    {dayCost > 0 && <span style={{ fontSize: 10, color: '#4BDE80' }}>${dayCost.toFixed(2)}</span>}
                    <button onClick={() => setAddToDay(addToDay === d ? null : d)} style={{ width: 22, height: 22, borderRadius: 6, border: '1px solid rgba(255,255,255,0.15)', background: 'rgba(255,255,255,0.05)', color: '#aaa', cursor: 'pointer', fontSize: 14, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>+</button>
                  </div>
                </div>
                {dayMeals.map((m, mi) => (
                  <div key={mi} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontSize: 12, color: '#ccc', padding: '5px 0', borderTop: '1px solid rgba(255,255,255,0.04)' }}>
                    <span>{m.name}</span>
                    <button onClick={() => removeFromPlan(d, mi)} style={{ width: 18, height: 18, borderRadius: 4, border: 'none', background: 'rgba(255,255,255,0.06)', color: '#666', cursor: 'pointer', fontSize: 10 }}>✕</button>
                  </div>
                ))}
                {addToDay === d && (
                  <div style={{ marginTop: 8, background: 'rgba(0,0,0,0.4)', borderRadius: 10, padding: 8, maxHeight: 160, overflowY: 'auto' }}>
                    {saved.length === 0
                      ? <div style={{ fontSize: 11, color: '#555' }}>Save recipes in Cookbook first</div>
                      : saved.map(r => (
                        <div key={r.id} onClick={() => { addToPlan(d, r); setAddToDay(null); }} style={{ padding: '7px 0', fontSize: 12, color: '#aaa', cursor: 'pointer', borderBottom: '1px solid rgba(255,255,255,0.04)', display: 'flex', justifyContent: 'space-between' }}>
                          <span>{r.name}</span>
                          <span style={{ color: '#4BDE80', fontSize: 10 }}>${estimateRecipeCost(r).toFixed(2)}</span>
                        </div>
                      ))}
                  </div>
                )}
              </div>
            );
          })}

          <button onClick={buildShoppingFromPlan} style={{ width: '100%', padding: 13, borderRadius: 13, border: '1px solid rgba(245,200,66,0.3)', background: 'rgba(245,200,66,0.08)', color: '#F5C842', fontFamily: "'Oswald',sans-serif", fontSize: 15, fontWeight: 700, cursor: 'pointer', marginTop: 4 }}>
            🛒 BUILD SHOPPING LIST FROM PLAN
          </button>
          <div style={{ height: 80 }} />
        </div>
      </div>
    );
  }

                  <div style={{ flex: 1, background: 'rgba(75,222,128,0.08)', borderRadius: 12, padding: 10, textAlign: 'center', border: '1px solid rgba(75,222,128,0.2)' }}>
                    <div style={{ fontSize: 16, fontFamily: "'Bebas Neue',sans-serif", color: '#4BDE80' }}>${estTotal.toFixed(2)}</div>
                    <div style={{ fontSize: 9, color: '#666' }}>EST. COST</div>
                  </div>
                )}
                <button onClick={() => setShopList(p => p.filter(i => !i.checked))} style={{ flex: 1, borderRadius: 12, border: '1px solid rgba(255,255,255,0.1)', background: 'rgba(255,255,255,0.04)', color: '#888', cursor: 'pointer', fontFamily: "'Oswald',sans-serif", fontSize: 11, fontWeight: 600 }}>
                  CLEAR DONE
                </button>
              </div>
            )}

            {shopList.length === 0 ? (
              <div style={{ textAlign: 'center', padding: '60px 0', color: '#444' }}>
                <div style={{ fontSize: 40, marginBottom: 8 }}>🛒</div>
                <div>List is empty</div>
                <div style={{ fontSize: 12, marginTop: 4, color: '#333' }}>Build from meal plan or add manually</div>
              </div>
            ) : shopList.map(item => (
              <div key={item.id} onClick={() => toggleShopItem(item.id)} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '12px 14px', borderRadius: 12, marginBottom: 6, background: item.checked ? 'rgba(75,222,128,0.04)' : 'rgba(255,255,255,0.03)', border: `1px solid ${item.checked ? 'rgba(75,222,128,0.15)' : 'rgba(255,255,255,0.06)'}`, cursor: 'pointer' }}>
                <div style={{ width: 20, height: 20, borderRadius: 6, border: `2px solid ${item.checked ? '#4BDE80' : 'rgba(255,255,255,0.2)'}`, background: item.checked ? 'rgba(75,222,128,0.2)' : 'transparent', flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, color: '#4BDE80' }}>
                  {item.checked ? '✓' : ''}
                </div>
                <div style={{ flex: 1, fontSize: 13, color: item.checked ? '#555' : '#ddd', textDecoration: item.checked ? 'line-through' : 'none' }}>{item.text}</div>
                {item.estCost > 0 && <div style={{ fontSize: 11, color: '#4BDE80', flexShrink: 0 }}>${item.estCost.toFixed(2)}</div>}
                <button onClick={e => { e.stopPropagation(); setShopList(p => p.filter(i => i.id !== item.id)); }} style={{ width: 20, height: 20, borderRadius: 5, border: 'none', background: 'rgba(255,255,255,0.05)', color: '#666', cursor: 'pointer', fontSize: 10, flexShrink: 0 }}>✕</button>
              </div>
            ))}
            <div style={{ height: 80 }} />
          </div>
        )}

        {shopTab === 'budget' && (
          <div style={{ flex: 1, overflowY: 'auto', padding: '14px 16px' }}>
            <div style={{ background: 'rgba(255,255,255,0.03)', borderRadius: 20, padding: 20, border: '1px solid rgba(255,255,255,0.06)', marginBottom: 14, textAlign: 'center' }}>
              <div style={{ fontSize: 10, color: '#4a6a7a', letterSpacing: 1, marginBottom: 12 }}>WEEKLY BUDGET</div>
              <MacroRing value={`$${thisWeekSpend.toFixed(0)}`} max={weekBudget} label="SPENT" unit="" color={budgetPct > 0.9 ? '#FF6B4A' : budgetPct > 0.7 ? '#F5C842' : '#4BDE80'} size={120} />
              <div style={{ marginTop: 12, fontSize: 13, color: '#aaa' }}>${(weekBudget - thisWeekSpend).toFixed(2)} remaining of ${weekBudget}/week</div>
              <div style={{ marginTop: 8, display: 'flex', gap: 8, alignItems: 'center', justifyContent: 'center' }}>
                <span style={{ fontSize: 12, color: '#555' }}>Budget: $</span>
                <input type="number" value={weekBudget} onChange={e => setWeekBudget(parseFloat(e.target.value) || 150)}
                  style={{ width: 80, padding: '5px 8px', borderRadius: 8, border: '1px solid rgba(255,255,255,0.1)', background: 'rgba(255,255,255,0.05)', color: '#fff', fontSize: 16, textAlign: 'center', fontFamily: "'Bebas Neue',sans-serif", outline: 'none' }} />
                <span style={{ fontSize: 12, color: '#555' }}>/week</span>
              </div>
            </div>

            <div style={{ background: 'rgba(255,255,255,0.03)', borderRadius: 16, padding: 14, border: '1px solid rgba(255,255,255,0.06)', marginBottom: 14 }}>
              <div style={{ fontSize: 10, color: '#4a6a7a', letterSpacing: 1, marginBottom: 10 }}>LOG GROCERY SPEND</div>
              <div style={{ display: 'flex', gap: 8, marginBottom: 8 }}>
                <input type="number" value={spendAmt} onChange={e => setSpendAmt(e.target.value)} placeholder="$0.00"
                  style={{ flex: 1, padding: 10, borderRadius: 10, border: '1px solid rgba(255,255,255,0.1)', background: 'rgba(255,255,255,0.04)', color: '#fff', fontSize: 18, textAlign: 'center', fontFamily: "'Bebas Neue',sans-serif", outline: 'none' }} />
                <input value={spendNote} onChange={e => setSpendNote(e.target.value)} placeholder="Store / note"
                  style={{ flex: 2, padding: '10px 12px', borderRadius: 10, border: '1px solid rgba(255,255,255,0.1)', background: 'rgba(255,255,255,0.04)', color: '#fff', fontSize: 13, fontFamily: 'inherit', outline: 'none' }} />
              </div>
              <button onClick={() => { if (spendAmt) { addGrocerySpend(spendAmt, spendNote); setSpendAmt(''); setSpendNote(''); showToast('Spend logged', 'success'); } }} style={{ width: '100%', padding: 11, borderRadius: 11, border: 'none', background: '#4BDE80', color: '#000', fontFamily: "'Oswald',sans-serif", fontSize: 15, fontWeight: 700, cursor: 'pointer' }}>
                LOG SPEND
              </button>
            </div>

            {grocLog.length === 0 ? (
              <div style={{ textAlign: 'center', padding: '40px 0', color: '#444' }}>
                <div style={{ fontSize: 36, marginBottom: 8 }}>💰</div>
                <div>No grocery spend logged yet</div>
              </div>
            ) : grocLog.slice().reverse().slice(0, 30).map((g, i) => (
              <div key={g.id || i} style={{ display: 'flex', justifyContent: 'space-between', padding: '10px 14px', borderRadius: 12, background: 'rgba(255,255,255,0.02)', marginBottom: 5, border: '1px solid rgba(255,255,255,0.05)' }}>
                <div>
                  <div style={{ fontSize: 13, color: '#ccc' }}>{g.note || 'Grocery run'}</div>
                  <div style={{ fontSize: 10, color: '#555' }}>{g.date}</div>
                </div>
                <div style={{ fontSize: 15, fontFamily: "'Bebas Neue',sans-serif", color: '#FF6B4A' }}>${(g.amount || 0).toFixed(2)}</div>
              </div>
            ))}
            <div style={{ height: 80 }} />
          </div>
        )}
      </div>
    );
  }

  /* ── SETTINGS MODAL ── */
  function SettingsModal() {
    const inp = { width: '100%', padding: '11px 14px', borderRadius: 12, border: '1px solid rgba(255,255,255,0.1)', background: 'rgba(255,255,255,0.05)', color: '#fff', fontSize: 13, fontFamily: 'inherit', outline: 'none', marginBottom: 8 };
    return (
      <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.85)', zIndex: 500, display: 'flex', alignItems: 'flex-end' }}>
        <div style={{ width: '100%', maxHeight: '90vh', overflowY: 'auto', background: '#111520', borderRadius: '24px 24px 0 0', padding: '24px 20px', paddingBottom: 'max(env(safe-area-inset-bottom),24px)' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
            <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 24, color: '#fff', letterSpacing: 1 }}>SETTINGS</div>
            <button onClick={() => setShowSettings(false)} style={{ width: 32, height: 32, borderRadius: '50%', border: '1px solid rgba(255,255,255,0.1)', background: 'rgba(255,255,255,0.05)', color: '#aaa', cursor: 'pointer', fontSize: 16 }}>✕</button>
          </div>

          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 10, color: '#4a6a7a', letterSpacing: 1, marginBottom: 10 }}>TRAINING GOAL</div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
              {Object.entries(GOAL_PRESETS).map(([k, g]) => (
                <button key={k} onClick={() => setUserGoal(k)} style={{ padding: '12px 10px', borderRadius: 14, border: `2px solid ${userGoal === k ? '#4A9EFF' : 'rgba(255,255,255,0.08)'}`, background: userGoal === k ? 'rgba(74,158,255,0.12)' : 'rgba(255,255,255,0.03)', color: '#fff', cursor: 'pointer', textAlign: 'left' }}>
                  <div style={{ fontSize: 15, marginBottom: 3 }}>{g.emoji} {g.label}</div>
                  <div style={{ fontSize: 10, color: '#777' }}>{g.cal} cal · {g.protein}g P</div>
                  <div style={{ fontSize: 9, color: '#555', marginTop: 2 }}>{g.desc}</div>
                </button>
              ))}
            </div>
          </div>

          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 10, color: '#4a6a7a', letterSpacing: 1, marginBottom: 8 }}>WEEKLY GROCERY BUDGET</div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ fontSize: 20, color: '#4BDE80' }}>$</span>
              <input type="number" value={sBudget} onChange={e => setSBudget(e.target.value)}
                style={{ ...inp, flex: 1, margin: 0, fontSize: 22, fontFamily: "'Bebas Neue',sans-serif", textAlign: 'center' }} />
              <span style={{ fontSize: 12, color: '#555' }}>/week</span>
            </div>
          </div>

          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 10, color: '#4a6a7a', letterSpacing: 1, marginBottom: 8 }}>CLAUDE API KEY</div>
            <input type="password" value={sKey} onChange={e => setSKey(e.target.value)} placeholder="sk-ant-…" style={inp} />
            <div style={{ fontSize: 10, color: '#4a6a7a', letterSpacing: 1, marginBottom: 8, marginTop: 4 }}>VERCEL URL (TikTok / Instagram import)</div>
            <input value={sUrl} onChange={e => setSUrl(e.target.value)} placeholder="https://your-app.vercel.app" style={inp} />
          </div>

          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 10, color: '#4a6a7a', letterSpacing: 1, marginBottom: 8 }}>OBSIDIAN VAULT NAME (for phone export)</div>
            <input value={sVaultName} onChange={e => setSVaultName(e.target.value)} placeholder="My Vault" style={inp} />
            <div style={{ fontSize: 10, color: '#555', marginBottom: 12 }}>Exact name of your vault in Obsidian — needed for phone deep-link export</div>

            {!isMobile ? (
              /* Desktop: single button, picks folder directly */
              <>
                <button onClick={exportToObsidianDesktop} style={{ width: '100%', padding: 13, borderRadius: 13, border: '1px solid rgba(168,85,247,0.4)', background: 'rgba(168,85,247,0.1)', color: '#A855F7', fontFamily: "'Oswald',sans-serif", fontSize: 14, fontWeight: 700, cursor: 'pointer' }}>
                  📁 PICK VAULT FOLDER &amp; EXPORT
                </button>
                <div style={{ fontSize: 10, color: '#555', marginTop: 5, textAlign: 'center' }}>Writes today's log + last workout directly into your vault</div>
              </>
            ) : (
              /* Mobile: Obsidian URI + Share Sheet */
              <>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, marginBottom: 8 }}>
                  <button onClick={() => exportToObsidianMobile('log')} style={{ padding: 12, borderRadius: 12, border: '1px solid rgba(168,85,247,0.4)', background: 'rgba(168,85,247,0.1)', color: '#A855F7', fontFamily: "'Oswald',sans-serif", fontSize: 12, fontWeight: 700, cursor: 'pointer' }}>
                    📲 DAILY LOG<br/><span style={{ fontSize: 10, fontWeight: 400 }}>Open in Obsidian</span>
                  </button>
                  <button onClick={() => exportToObsidianMobile('workout')} style={{ padding: 12, borderRadius: 12, border: '1px solid rgba(168,85,247,0.4)', background: 'rgba(168,85,247,0.1)', color: '#A855F7', fontFamily: "'Oswald',sans-serif", fontSize: 12, fontWeight: 700, cursor: 'pointer' }}>
                    📲 WORKOUT<br/><span style={{ fontSize: 10, fontWeight: 400 }}>Open in Obsidian</span>
                  </button>
                </div>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
                  <button onClick={() => shareAsMdFile('log')} style={{ padding: 12, borderRadius: 12, border: '1px solid rgba(74,158,255,0.3)', background: 'rgba(74,158,255,0.08)', color: '#4A9EFF', fontFamily: "'Oswald',sans-serif", fontSize: 12, fontWeight: 700, cursor: 'pointer' }}>
                    📤 SHARE LOG<br/><span style={{ fontSize: 10, fontWeight: 400 }}>Save to Files/iCloud</span>
                  </button>
                  <button onClick={() => shareAsMdFile('workout')} style={{ padding: 12, borderRadius: 12, border: '1px solid rgba(74,158,255,0.3)', background: 'rgba(74,158,255,0.08)', color: '#4A9EFF', fontFamily: "'Oswald',sans-serif", fontSize: 12, fontWeight: 700, cursor: 'pointer' }}>
                    📤 SHARE WORKOUT<br/><span style={{ fontSize: 10, fontWeight: 400 }}>Save to Files/iCloud</span>
                  </button>
                </div>
                <div style={{ fontSize: 10, color: '#555', marginTop: 6, textAlign: 'center' }}>
                  "Open in Obsidian" creates the note instantly · "Share" saves to iCloud/Files for manual import
                </div>
              </>
            )}
          </div>

          <button onClick={() => {
            setApiKey(sKey); setVercelUrl(sUrl);
            setWeekBudget(parseFloat(sBudget) || 150);
            setVaultName(sVaultName);
            setShowSettings(false); showToast('Settings saved ✓', 'success');
          }} style={{ width: '100%', padding: 15, borderRadius: 14, border: 'none', background: '#4BDE80', color: '#000', fontFamily: "'Oswald',sans-serif", fontSize: 18, fontWeight: 700, cursor: 'pointer', letterSpacing: 0.5, marginBottom: 10 }}>
            SAVE SETTINGS
          </button>

          <button onClick={() => {
            // Save first so sync link has latest values
            setApiKey(sKey); setVercelUrl(sUrl); setWeekBudget(parseFloat(sBudget) || 150); setVaultName(sVaultName);
            setTimeout(generateSyncLink, 50);
          }} style={{ width: '100%', padding: 13, borderRadius: 14, border: '1px solid rgba(74,158,255,0.35)', background: 'rgba(74,158,255,0.08)', color: '#4A9EFF', fontFamily: "'Oswald',sans-serif", fontSize: 15, fontWeight: 700, cursor: 'pointer', letterSpacing: 0.5 }}>
            📱 COPY SYNC LINK (FOR OTHER DEVICES)
          </button>
          <div style={{ fontSize: 11, color: '#555', textAlign: 'center', marginTop: 6 }}>
            Opens your app pre-loaded with API key & settings on any device
          </div>
        </div>
      </div>
    );
  }

  /* ── NAV + MAIN RENDER ── */
  const NAV = [
    { id: 'home',  icon: '🏠', label: 'Home'    },
    { id: 'log',   icon: '🍽️', label: 'Log'     },
    { id: 'train', icon: '💪',  label: 'Train'   },
    { id: 'cook',  icon: '📖',  label: 'Recipes' },
    { id: 'plan',  icon: '📅',  label: 'Plan'    },
    { id: 'shop',  icon: '🛒',  label: 'Shop'    },
  ];

  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: '#0c0c18', color: '#fff', fontFamily: "'SF Pro Display',-apple-system,BlinkMacSystemFont,sans-serif", maxWidth: 500, margin: '0 auto', position: 'relative' }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;600;700&display=swap');
        .pop{animation:popIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275) both;}
        @keyframes popIn{from{transform:scale(0.85);opacity:0}to{transform:scale(1);opacity:1}}
        input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
        ::-webkit-scrollbar{width:2px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px;}
      `}</style>

      <div style={{ height: 'env(safe-area-inset-top)', background: '#0c0c18', flexShrink: 0 }} />

      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        {screen === 'home'  && HomeScreen()}
        {screen === 'log'   && LoggerScreen()}
        {screen === 'train' && WorkoutScreen()}
        {screen === 'cook'  && CookbookScreen()}
        {screen === 'plan'  && PlannerScreen()}
        {screen === 'shop'  && ShoppingScreen()}
      </div>

      <div style={{ display: 'flex', background: 'rgba(10,10,20,0.98)', borderTop: '1px solid rgba(255,255,255,0.06)', paddingBottom: 'max(env(safe-area-inset-bottom),4px)', flexShrink: 0 }}>
        {NAV.map(({ id, icon, label }) => (
          <button key={id} onClick={() => setScreen(id)} style={{ flex: 1, padding: '8px 2px', border: 'none', background: 'transparent', color: screen === id ? '#4BDE80' : '#3a4a5a', cursor: 'pointer', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2, transition: 'color 0.15s' }}>
            <span style={{ fontSize: 18, lineHeight: 1 }}>{icon}</span>
            <span style={{ fontSize: 8, fontFamily: "'Oswald',sans-serif", fontWeight: 600, letterSpacing: 0.5 }}>{label.toUpperCase()}</span>
          </button>
        ))}
      </div>

      {toast && (
        <div className="pop" style={{ position: 'fixed', bottom: 80, left: '50%', transform: 'translateX(-50%)', padding: '11px 20px', borderRadius: 24, background: toast.type === 'error' ? 'rgba(255,80,80,0.96)' : toast.type === 'info' ? 'rgba(74,158,255,0.96)' : 'rgba(75,222,128,0.96)', color: '#000', fontWeight: 700, fontSize: 13, zIndex: 900, boxShadow: '0 4px 24px rgba(0,0,0,0.5)', whiteSpace: 'nowrap', maxWidth: '90vw', textAlign: 'center' }}>
          {toast.msg}
        </div>
      )}

      {badge && (
        <div className="pop" style={{ position: 'fixed', top: '50%', left: '50%', transform: 'translate(-50%,-50%)', padding: '28px 32px', borderRadius: 24, background: 'rgba(10,10,20,0.98)', border: `2px solid ${badge.color || '#4BDE80'}`, zIndex: 800, textAlign: 'center', boxShadow: '0 8px 60px rgba(0,0,0,0.8)', maxWidth: '85vw' }}>
          <div style={{ fontSize: 44, marginBottom: 10 }}>🏆</div>
          <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 24, color: badge.color || '#4BDE80', letterSpacing: 1, marginBottom: 5 }}>{badge.msg}</div>
          {badge.sub && <div style={{ fontSize: 12, color: '#aaa' }}>{badge.sub}</div>}
        </div>
      )}

      {showBarcode && <BarcodeScanner onScan={handleBarcodeScan} onClose={() => setShowBarcode(false)} />}
      {showSettings && SettingsModal()}
    </div>
  );
}

/* ── SERVICE WORKER ── */
if ('serviceWorker' in navigator) {
  const sw = `const C='drews-hub-v6';self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(['.'])));self.skipWaiting();});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim();});self.addEventListener('fetch',e=>{if(e.request.method!=='GET')return;const u=e.request.url;if(u.includes('api.anthropic.com')||u.includes('openfoodfacts')||u.includes('themealdb')||u.includes('fonts.googleapis')||u.includes('cdnjs'))return;e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{if(res&&res.ok){const cl=res.clone();caches.open(C).then(c=>c.put(e.request,cl));}return res;})));});`;
  try { navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw], { type: 'application/javascript' }))).catch(() => {}); } catch {}
}

ReactDOM.render(React.createElement(FitnessHub), document.getElementById('root'));
</script>
</body>
</html>
