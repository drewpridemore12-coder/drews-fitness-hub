              <div style={{ fontSize: 14, fontFamily: "'Bebas Neue',sans-serif", color: c }}>{fmt(v)}{u}</div>
              <div style={{ fontSize: 8, color: '#555' }}>/{t}{u}</div>
              <div style={{ fontSize: 8, color: '#666', marginTop: 1 }}>{l}</div>
            </div>
          ))}
        </div>

        {entries.length > 0 ? (
          <div style={{ background: 'rgba(255,255,255,0.03)', borderRadius: 16, border: '1px solid rgba(255,255,255,0.06)' }}>
            {entries.slice().reverse().map((e, i) => (
              <div key={e.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '11px 14px', borderBottom: i < entries.length - 1 ? '1px solid rgba(255,255,255,0.04)' : undefined }}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 13, color: '#ddd', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{e.name}</div>
                  <div style={{ fontSize: 10, color: '#555', marginTop: 2 }}>{e.time} · {e.protein}g P · {e.carbs}g C · {e.fat}g F{e.recipeCost ? ` · $${e.recipeCost.toFixed(2)}` : ''}</div>
                </div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <div style={{ fontSize: 14, fontFamily: "'Bebas Neue',sans-serif", color: '#FF6B4A' }}>{e.cal}</div>
                  <button onClick={() => setEntries(p => p.filter(x => x.id !== e.id))} style={{ width: 22, height: 22, borderRadius: 6, border: 'none', background: 'rgba(255,255,255,0.06)', color: '#666', cursor: 'pointer', fontSize: 11 }}>✕</button>
                </div>
              </div>
            ))}
          </div>
        ) : (
          <div style={{ textAlign: 'center', padding: '50px 0', color: '#444' }}>
            <div style={{ fontSize: 40, marginBottom: 8 }}>🍽️</div>
            <div style={{ fontSize: 14 }}>No entries yet today</div>
          </div>
        )}
        <div style={{ height: 80 }} />
      </div>
    );
  }

  /* ── WORKOUT ── */
  function WorkoutScreen() {
    const insights = computeProgressiveOverload();
    return (
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        <div style={{ display: 'flex', padding: '0 16px', paddingTop: 16, flexShrink: 0 }}>
          {[['today', 'TODAY'], ['history', 'HISTORY'], ['coach', 'AI COACH']].map(([k, l]) => (
            <button key={k} onClick={() => setTrainTab(k)} style={{ flex: 1, padding: '10px 4px', border: 'none', borderBottom: `2px solid ${trainTab === k ? '#FF6B4A' : 'rgba(255,255,255,0.06)'}`, background: 'transparent', color: trainTab === k ? '#FF6B4A' : '#555', fontFamily: "'Oswald',sans-serif", fontSize: 12, fontWeight: 600, cursor: 'pointer', letterSpacing: 1 }}>
              {l}
            </button>
          ))}
        </div>

        {trainTab === 'today' && (
          <div style={{ flex: 1, overflow: 'hidden' }}>
            <WorkoutTimerApp onBack={() => setTrainTab('today')} onSave={saveWorkoutSession} />
          </div>
        )}

        {trainTab === 'history' && (
          <div style={{ flex: 1, overflowY: 'auto', padding: '14px 16px' }}>
            {StrengthChart()}
            {vault.length === 0 ? (
              <div style={{ textAlign: 'center', padding: '60px 0', color: '#444' }}>
                <div style={{ fontSize: 40, marginBottom: 8 }}>📋</div>
                <div>No workouts logged yet</div>
              </div>
            ) : vault.slice().reverse().map((s, i) => (
              <div key={s.id || i} style={{ background: 'rgba(255,255,255,0.03)', borderRadius: 16, padding: 14, marginBottom: 10, border: '1px solid rgba(255,255,255,0.06)' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 5 }}>
                  <div style={{ fontFamily: "'Oswald',sans-serif", fontSize: 15, fontWeight: 600, color: '#FF6B4A' }}>{s.workout}</div>
                  <div style={{ fontSize: 11, color: '#555' }}>{s.date}</div>
                </div>
                <div style={{ fontSize: 11, color: '#888', marginBottom: 6 }}>Duration: {Math.floor((s.duration || 0) / 60)}m {(s.duration || 0) % 60}s · {(s.exercises || []).length} exercises</div>
                {(s.exercises || []).slice(0, 4).map((ex, j) => (
                  <div key={j} style={{ fontSize: 11, color: '#666', paddingLeft: 8, borderLeft: '2px solid rgba(255,107,74,0.3)', marginBottom: 3 }}>
                    {ex.name}: {ex.maxWeight || 0}lb max · {ex.completedSets || 0} sets
                  </div>
                ))}
                {(s.exercises || []).length > 4 && <div style={{ fontSize: 10, color: '#555', paddingLeft: 8 }}>+{(s.exercises || []).length - 4} more</div>}
              </div>
            ))}
            <div style={{ height: 80 }} />
          </div>
        )}

        {trainTab === 'coach' && (
          <div style={{ flex: 1, overflowY: 'auto', padding: '14px 16px' }}>
            {insights.length > 0 && (
              <div style={{ marginBottom: 14 }}>
                <div style={{ fontSize: 10, color: '#4a6a7a', letterSpacing: 1, marginBottom: 8 }}>ALGORITHM FLAGS</div>
                {insights.map((ins, i) => {
                  const clr = { plateau: '#F5C842', drop: '#FF6B4A', missed: '#FF6B4A', progress: '#4BDE80' }[ins.type];
                  const ico = { plateau: '⚠️', drop: '📉', missed: '❌', progress: '📈' }[ins.type];
                  return (
                    <div key={i} style={{ background: `${clr}10`, borderRadius: 12, padding: '10px 12px', marginBottom: 8, border: `1px solid ${clr}30` }}>
                      <div style={{ fontWeight: 700, fontSize: 12, color: clr, marginBottom: 3 }}>{ico} {ins.exercise}</div>
                      <div style={{ fontSize: 12, color: '#ccc' }}>{ins.msg}</div>
                    </div>
                  );
                })}
              </div>
            )}
            <button onClick={analyzeWorkouts} disabled={coachLoading} style={{ width: '100%', padding: 14, borderRadius: 14, border: 'none', background: coachLoading ? 'rgba(255,107,74,0.3)' : '#FF6B4A', color: '#000', fontFamily: "'Oswald',sans-serif", fontSize: 17, fontWeight: 700, cursor: coachLoading ? 'not-allowed' : 'pointer', marginBottom: 14, letterSpacing: 0.5 }}>
              {coachLoading ? 'Analyzing…' : '🤖 AI COACH ANALYSIS'}
            </button>
            {coachText && (
              <div style={{ background: 'rgba(255,255,255,0.03)', borderRadius: 16, padding: 16, border: '1px solid rgba(255,107,74,0.2)', whiteSpace: 'pre-wrap', fontSize: 13, color: '#ddd', lineHeight: 1.65 }}>
                {coachText}
              </div>
            )}
            {!vault.length && !insights.length && (
              <div style={{ textAlign: 'center', padding: '40px 0', color: '#444' }}>
                <div style={{ fontSize: 40, marginBottom: 8 }}>🏋️</div>
                <div>Complete workouts to unlock AI coaching</div>
              </div>
            )}
            <div style={{ height: 80 }} />
          </div>
        )}
      </div>
    );
  }

  /* ── COOKBOOK ── */
  function CookbookScreen() {
    const allRecipes = [...saved, ...onlineResults.filter(o => !saved.find(s => s.id === o.id))];
    const shredsFiltered = shredsSearch.trim()
      ? TASTY_SHREDS_RECIPES.filter(r => r.name.toLowerCase().includes(shredsSearch.toLowerCase()) || r.ingredients.some(i => (i.name||'').toLowerCase().includes(shredsSearch.toLowerCase())))
      : TASTY_SHREDS_RECIPES;

    if (activeRecipe) {
      const cost = estimateRecipeCost(activeRecipe);
      return (
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
          <div style={{ padding: '14px 16px', display: 'flex', alignItems: 'center', gap: 10, borderBottom: '1px solid rgba(255,255,255,0.06)', flexShrink: 0 }}>
            <button onClick={() => setActiveRecipe(null)} style={{ width: 32, height: 32, borderRadius: '50%', border: '1px solid rgba(255,255,255,0.1)', background: 'rgba(255,255,255,0.05)', color: '#aaa', cursor: 'pointer', fontSize: 16 }}>←</button>
            <div style={{ fontFamily: "'Oswald',sans-serif", fontSize: 16, fontWeight: 600, color: '#fff', flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{activeRecipe.name}</div>
            <StarRating id={activeRecipe.id} ratings={ratings} setRatings={setRatings} />
          </div>
          <div style={{ flex: 1, overflowY: 'auto', padding: '14px 16px' }}>
            <div style={{ display: 'flex', gap: 6, marginBottom: 14, flexWrap: 'wrap' }}>
              {[[`${fmt(activeRecipe.calories)}`, 'Cal', '#FF6B4A'],
                [`${fmt(activeRecipe.protein)}g`, 'Prot', '#4A9EFF'],
                [`${fmt(activeRecipe.carbs)}g`, 'Carb', '#A855F7'],
                [`${fmt(activeRecipe.fat)}g`, 'Fat', '#F5C842'],
                [`$${cost.toFixed(2)}`, '/srv', '#4BDE80']].map(([v, l, c]) => (
                <div key={l} style={{ flex: '1 0 58px', background: `${c}12`, borderRadius: 12, padding: '10px 4px', textAlign: 'center', border: `1px solid ${c}25` }}>
                  <div style={{ fontSize: 15, fontFamily: "'Bebas Neue',sans-serif", color: c }}>{v}</div>
                  <div style={{ fontSize: 9, color: '#555' }}>{l}</div>
                </div>
              ))}
            </div>

            {(activeRecipe.ingredients || []).length > 0 && (
              <div style={{ marginBottom: 14 }}>
                <div style={{ fontSize: 10, color: '#4a6a7a', letterSpacing: 1, marginBottom: 8 }}>INGREDIENTS</div>
                {activeRecipe.ingredients.map((ing, i) => {
                  // Support both {name,amount} (AI) and {item,qty,unit} (MDB) formats
                  const label = ing.name
                    ? `${ing.amount ? ing.amount + ' ' : ''}${ing.name}`
                    : `${ing.qty || ''} ${ing.unit || ''} ${ing.item || ''}`.trim();
                  const c = ing.name
                    ? estimateIngredientCost(ing.name, 1, 'serving')
                    : estimateIngredientCost(ing.item, ing.qty, ing.unit);
                  return (
                    <div key={i} style={{ display: 'flex', justifyContent: 'space-between', padding: '7px 0', borderBottom: '1px solid rgba(255,255,255,0.04)', fontSize: 13, color: '#ccc' }}>
                      <span>{label}</span>
                      {c > 0 && <span style={{ color: '#4BDE80', fontSize: 11 }}>${c.toFixed(2)}</span>}
                    </div>
                  );
                })}
              </div>
            )}

            {activeRecipe.instructions && (() => {
              // Split on newlines or "1. 2. 3." numbered patterns
              const raw = activeRecipe.instructions;
              const steps = raw.split(/\n+/).flatMap(line =>
                line.split(/(?=\d+\.\s)/).map(s => s.trim())
              ).filter(s => s.length > 2);
              return (
                <div style={{ marginBottom: 14 }}>
                  <div style={{ fontSize: 10, color: '#4a6a7a', letterSpacing: 1, marginBottom: 10 }}>
                    INSTRUCTIONS {(activeRecipe.prepTime || activeRecipe.cookTime) && <span style={{ color: '#555', fontWeight: 400, letterSpacing: 0 }}>· ⏱ {[activeRecipe.prepTime && `prep ${activeRecipe.prepTime}`, activeRecipe.cookTime && `cook ${activeRecipe.cookTime}`].filter(Boolean).join(' · ')}</span>}
                  </div>
                  {steps.map((step, i) => {
                    const clean = step.replace(/^\d+\.\s*/, '');
                    const stepNum = step.match(/^(\d+)\./)?.[1] || (i + 1);
                    return (
                      <div key={i} style={{ display: 'flex', gap: 12, marginBottom: 12, alignItems: 'flex-start' }}>
                        <div style={{ width: 24, height: 24, borderRadius: '50%', background: 'rgba(74,158,255,0.15)', border: '1px solid rgba(74,158,255,0.3)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, color: '#4A9EFF', fontWeight: 700, flexShrink: 0, marginTop: 1 }}>{stepNum}</div>
                        <div style={{ fontSize: 13, color: '#ccc', lineHeight: 1.6, flex: 1 }}>{clean}</div>
                      </div>
                    );
                  })}
                </div>
              );
            })()}

            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 10 }}>
              <button onClick={() => { addRecipeToLog(activeRecipe, 1); setScreen('log'); }} style={{ flex: 1, padding: 13, borderRadius: 13, border: 'none', background: '#4BDE80', color: '#000', fontFamily: "'Oswald',sans-serif", fontSize: 14, fontWeight: 700, cursor: 'pointer' }}>
                + LOG IT
              </button>
              {!saved.find(s => s.id === activeRecipe.id) && (
                <button onClick={() => { setSaved(p => { if (p.length === 0) { awardBadge('first_recipe'); addXP(5); } return [activeRecipe, ...p]; }); showToast('Saved to cookbook +5 XP', 'success'); }} style={{ flex: 1, padding: 13, borderRadius: 13, border: '1px solid rgba(74,158,255,0.4)', background: 'rgba(74,158,255,0.1)', color: '#4A9EFF', fontFamily: "'Oswald',sans-serif", fontSize: 14, fontWeight: 700, cursor: 'pointer' }}>
                  💾 SAVE
                </button>
              )}
              <button onClick={() => { addToPlan(todayStr(), activeRecipe); }} style={{ flex: 1, padding: 13, borderRadius: 13, border: '1px solid rgba(245,200,66,0.3)', background: 'rgba(245,200,66,0.08)', color: '#F5C842', fontFamily: "'Oswald',sans-serif", fontSize: 14, fontWeight: 700, cursor: 'pointer' }}>
                📅 PLAN
              </button>
            </div>
            <button onClick={() => { addRecipeToShopList(activeRecipe); setScreen('shop'); }} style={{ width: '100%', padding: 13, borderRadius: 13, border: '1px solid rgba(245,200,66,0.4)', background: 'rgba(245,200,66,0.1)', color: '#F5C842', fontFamily: "'Oswald',sans-serif", fontSize: 14, fontWeight: 700, cursor: 'pointer', marginBottom: 8 }}>
              🛒 ADD INGREDIENTS TO SHOPPING LIST
            </button>

            {(!activeRecipe.calories || activeRecipe.calories === 0) && (
              <button onClick={async () => {
                const r = await enrichRecipeWithMacros(activeRecipe);
                setActiveRecipe(r);
                if (saved.find(s => s.id === r.id)) setSaved(p => p.map(s => s.id === r.id ? r : s));
              }} style={{ width: '100%', padding: 12, borderRadius: 12, border: '1px solid rgba(245,200,66,0.3)', background: 'rgba(245,200,66,0.08)', color: '#F5C842', fontFamily: "'Oswald',sans-serif", fontSize: 14, cursor: 'pointer', marginBottom: 8 }}>
                ✨ ESTIMATE MACROS WITH AI
              </button>
            )}

            <button onClick={() => { setRecipeSwaps(null); getProteinSwaps(activeRecipe); }}
              disabled={swappingRecipe}
              style={{ width: '100%', padding: 12, borderRadius: 12, border: '1px solid rgba(75,222,128,0.3)', background: swappingRecipe ? 'rgba(75,222,128,0.03)' : 'rgba(75,222,128,0.08)', color: '#4BDE80', fontFamily: "'Oswald',sans-serif", fontSize: 14, cursor: 'pointer', marginBottom: 8 }}>
              {swappingRecipe ? '🔄 FINDING SWAPS…' : '🔄 HIGH PROTEIN SWAPS (WALMART)'}
            </button>

            {recipeSwaps && (
              <div style={{ background: 'rgba(75,222,128,0.05)', border: '1px solid rgba(75,222,128,0.15)', borderRadius: 14, padding: 14, marginBottom: 8 }}>
                <div style={{ fontFamily: "'Oswald',sans-serif", fontSize: 13, color: '#4BDE80', letterSpacing: 1, marginBottom: 10 }}>💪 PROTEIN SWAP IDEAS</div>
                {recipeSwaps.map((s, i) => (
                  <div key={i} style={{ marginBottom: 10, paddingBottom: 10, borderBottom: i < recipeSwaps.length - 1 ? '1px solid rgba(255,255,255,0.05)' : 'none' }}>
                    <div style={{ fontSize: 12, color: '#fff', marginBottom: 3 }}>
                      <span style={{ color: '#aaa', textDecoration: 'line-through' }}>{s.original}</span>
                      <span style={{ color: '#4BDE80', margin: '0 6px' }}>→</span>
                      <span style={{ fontWeight: 600 }}>{s.swap}</span>
                    </div>
                    <div style={{ fontSize: 11, color: '#888', marginBottom: 2 }}>🛒 Walmart: <span style={{ color: '#aaa' }}>{s.walmartProduct}</span></div>
                    <div style={{ display: 'flex', gap: 8, fontSize: 11 }}>
                      {s.proteinChange && <span style={{ color: '#4A9EFF' }}>Protein: {s.proteinChange}</span>}
                      {s.calChange && <span style={{ color: '#FF6B4A' }}>Cals: {s.calChange}</span>}
                    </div>
                    {s.tip && <div style={{ fontSize: 11, color: '#666', marginTop: 2, fontStyle: 'italic' }}>{s.tip}</div>}
                  </div>
                ))}
                <button onClick={() => addWalmartVersionToShopList(activeRecipe, recipeSwaps)}
                  style={{ width: '100%', marginTop: 6, padding: 12, borderRadius: 12, border: 'none', background: 'linear-gradient(135deg,#0071ce,#004c97)', color: '#fff', fontFamily: "'Oswald',sans-serif", fontSize: 14, fontWeight: 700, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}>
                  <span>🛒</span> ADD WALMART VERSION TO SHOPPING LIST
                </button>
              </div>
            )}
            <div style={{ height: 80 }} />
          </div>
        </div>
      );
    }

    // Shared recipe card renderer
    function RecipeCard({ r }) {
      const cost = estimateRecipeCost(r);
      const isSaved = !!saved.find(s => s.id === r.id);
      const isShreds = r.source === 'Tasty Shreds';
      return (
        <div onClick={() => { setRecipeSwaps(null); setActiveRecipe(r); }} style={{ background: isShreds ? 'rgba(255,107,74,0.05)' : 'rgba(255,255,255,0.03)', borderRadius: 16, padding: 14, marginBottom: 10, border: `1px solid ${isShreds ? 'rgba(255,107,74,0.2)' : r.source === 'web' ? 'rgba(74,158,255,0.15)' : r.source === 'claude' ? 'rgba(168,85,247,0.15)' : 'rgba(255,255,255,0.06)'}`, cursor: 'pointer' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 5 }}>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 14, fontWeight: 600, color: '#fff', marginBottom: 2 }}>{r.name}</div>
              {isShreds && <div style={{ fontSize: 9, color: '#FF6B4A', letterSpacing: 1 }}>TASTY SHREDS</div>}
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 4 }}>
              <StarRating id={r.id} ratings={ratings} setRatings={setRatings} size={12} />
              {isSaved && <span style={{ fontSize: 9, color: '#4BDE80', border: '1px solid rgba(75,222,128,0.3)', borderRadius: 4, padding: '1px 5px' }}>SAVED</span>}
            </div>
          </div>
          <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
            {r.calories > 0 && <span style={{ fontSize: 11, color: '#FF6B4A' }}>{r.calories} cal</span>}
            {r.protein > 0 && <span style={{ fontSize: 11, color: '#4A9EFF' }}>{r.protein}g protein</span>}
            {r.carbs > 0 && <span style={{ fontSize: 11, color: '#A855F7' }}>{r.carbs}g carbs</span>}
            {r.fat > 0 && <span style={{ fontSize: 11, color: '#F5C842' }}>{r.fat}g fat</span>}
            {cost > 0 && <span style={{ fontSize: 11, color: '#4BDE80' }}>${cost.toFixed(2)}/srv</span>}
          </div>
        </div>
      );
    }

    return (
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>

        {/* Tab bar */}
        <div style={{ display: 'flex', padding: '0 16px', paddingTop: 12, flexShrink: 0, borderBottom: '1px solid rgba(255,255,255,0.06)' }}>
          {[['shreds','🔥 TASTY SHREDS'],['my','📖 MY RECIPES'],['search','🔍 SEARCH']].map(([k,l]) => (
            <button key={k} onClick={() => setCookbookTab(k)} style={{ flex: 1, padding: '10px 4px', border: 'none', borderBottom: `2px solid ${cookbookTab === k ? '#FF6B4A' : 'rgba(255,255,255,0.06)'}`, background: 'transparent', color: cookbookTab === k ? '#FF6B4A' : '#555', fontFamily: "'Oswald',sans-serif", fontSize: 11, fontWeight: 600, cursor: 'pointer', letterSpacing: 0.5 }}>
              {l}
            </button>
          ))}
        </div>

        {/* TASTY SHREDS tab */}
        {cookbookTab === 'shreds' && (
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
            <div style={{ padding: '10px 16px', flexShrink: 0 }}>
              <input value={shredsSearch} onChange={e => setShredsSearch(e.target.value)} placeholder="Search 130 Tasty Shreds recipes…"
                style={{ width: '100%', padding: '10px 14px', borderRadius: 12, border: '1px solid rgba(255,107,74,0.25)', background: 'rgba(255,107,74,0.05)', color: '#fff', fontSize: 13, fontFamily: 'inherit', outline: 'none', boxSizing: 'border-box' }} />
              <div style={{ fontSize: 10, color: '#555', marginTop: 6, textAlign: 'center' }}>130 high-protein recipes · Kyle Smith's Tasty Shreds cookbook</div>
            </div>
            <div style={{ flex: 1, overflowY: 'auto', padding: '4px 16px' }}>
              {shredsFiltered.length === 0 ? (
                <div style={{ textAlign: 'center', padding: '40px 0', color: '#444' }}>No recipes match "{shredsSearch}"</div>
              ) : shredsFiltered.map(r => <RecipeCard key={r.id} r={r} />)}
              <div style={{ height: 80 }} />
            </div>
          </div>
        )}

        {/* MY RECIPES tab */}
        {cookbookTab === 'my' && (
          <div style={{ flex: 1, overflowY: 'auto', padding: '10px 16px' }}>
            {allRecipes.length === 0 ? (
              <div style={{ textAlign: 'center', padding: '60px 0', color: '#444' }}>
                <div style={{ fontSize: 40, marginBottom: 10 }}>📖</div>
                <div style={{ fontSize: 14, marginBottom: 6 }}>No saved recipes yet</div>
                <div style={{ fontSize: 12, color: '#333' }}>Save a Tasty Shreds recipe or search online</div>
              </div>
            ) : allRecipes.map(r => <RecipeCard key={r.id} r={r} />)}
            <div style={{ height: 80 }} />
          </div>
        )}

        {/* SEARCH tab */}
        {cookbookTab === 'search' && (
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
            <div style={{ padding: '10px 16px', flexShrink: 0 }}>
              <div style={{ display: 'flex', gap: 8, marginBottom: 8 }}>
                <input value={searchQ} onChange={e => setSearchQ(e.target.value)} placeholder="Search online recipes…"
                  style={{ flex: 1, padding: '10px 14px', borderRadius: 12, border: '1px solid rgba(255,255,255,0.1)', background: 'rgba(255,255,255,0.04)', color: '#fff', fontSize: 13, fontFamily: 'inherit', outline: 'none' }}

  /* ══════════════════════════════════════════════
     CHALLENGES SCREEN — Firebase real-time
  ══════════════════════════════════════════════ */
  function ChallengesScreen() {
    /* All state is hoisted to parent — no hooks here */
    const CTYPES = [
      { id:'protein',  emoji:'💪', label:'Protein',     unit:'g/day',    hint:`${goal.protein}g`,  defaultT: goal.protein },
      { id:'calories', emoji:'🔥', label:'Calories',    unit:'kcal',     hint:`${goal.cal} kcal`, defaultT: goal.cal },
      { id:'workouts', emoji:'🏋️', label:'Workouts',    unit:'sessions', hint:'Complete X sessions',                 defaultT: 5 },
      { id:'streak',   emoji:'📅', label:'Log Streak',  unit:'days',     hint:'Log food X days straight',           defaultT: 7 },
      { id:'budget',   emoji:'💰', label:'Budget Boss', unit:'$/week',   hint:`$${weekBudget}/wk`,                  defaultT: weekBudget },
      { id:'custom',   emoji:'🎯', label:'Custom',      unit:'',         hint:'Your rules, daily check-in',         defaultT: '' },
    ];
    const ct = CTYPES.find(t => t.id === cType) || CTYPES[0];

    /* ── leaderboard for one challenge (merges Gun remote data + local) ── */
    function getLeaderboard(challenge) {
      const parts = remoteData[challenge.id] || {};
      const start = new Date(challenge.startDate + 'T00:00:00');
      function dateStr(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
      const board = Object.entries(parts).map(([pid, pdata]) => {
        const isMe = pid === userId;
        const days = [];
        for (let i = 0; i < challenge.durationDays; i++) {
          const d = new Date(start); d.setDate(start.getDate() + i);
          const ds = dateStr(d);
          const status = isMe ? computeDayStatus(challenge, ds) : ((pdata.days || {})[ds] || (new Date(ds+'T12:00:00') > new Date() ? 'future' : 'miss'));
          days.push({ ds, status });
        }
        const done = days.filter(d => d.status === 'done').length;
        const past = days.filter(d => d.status !== 'future').length;
        return { pid, isMe, name: isMe ? (userName||'You') : (pdata.name||'Friend'),
          avatar: isMe ? (userAvatar||'💪') : (pdata.avatar||'💪'),
          days, done, past, pct: past > 0 ? Math.round(done/Math.max(past,1)*100) : 0, updatedAt: pdata.updatedAt||0 };
      });
      // Always ensure local "me" row is present
      if (!parts[userId]) {
        const myDays = [];
        for (let i = 0; i < challenge.durationDays; i++) {
          const d = new Date(start); d.setDate(start.getDate() + i);
          const ds = dateStr(d);
          myDays.push({ ds, status: computeDayStatus(challenge, ds) });
        }
        const done = myDays.filter(d => d.status === 'done').length;
        const past = myDays.filter(d => d.status !== 'future').length;
        board.unshift({ pid: userId, isMe: true, name: userName||'You', avatar: userAvatar||'💪', days: myDays, done, past, pct: past > 0 ? Math.round(done/Math.max(past,1)*100) : 0, updatedAt: 0 });
      }
      return board.sort((a,b) => b.pct - a.pct);
    }

    function buildLink(challenge) { return `${location.origin}${location.pathname}#join=${challenge.id}`; }

    function doCreate() {
      const typeObj = CTYPES.find(t => t.id === cType);
      const challenge = {
        id: 'ch_' + Date.now(), type: cType,
        title: cTitleVal.trim() || `${typeObj.label} Challenge`,
        emoji: typeObj.emoji, target: parseFloat(cTargetVal) || typeObj.defaultT || 1,
        durationDays: parseInt(cDaysVal) || 7, friendName: cFriend.trim(),
        createdBy: userName, startDate: todayStr(), createdAt: Date.now(), checkins: [], isOwn: true,
      };
      setMyChallenges(p => [...p, challenge]);
      gunPutMeta(challenge);   // push metadata to Gun P2P
      gunSyncProgress(challenge); // push creator's progress
      setCreatedLink(buildLink(challenge));
      setCView('list');
      showToast('Challenge created! Share the link 🎯', 'success');
    }

    function doCheckIn(id) {
      setMyChallenges(p => p.map(c => c.id === id ? { ...c, checkins: [...new Set([...(c.checkins||[]), todayStr()])] } : c));
      showToast('Checked in! 💪', 'success');
    }

    function doDelete(id) {
      setMyChallenges(p => p.filter(c => c.id !== id));
      showToast('Challenge removed', 'info');
    }

    function doInvite(challenge) {
      const link = buildLink(challenge);
      if (navigator.share) {
        navigator.share({ title: challenge.title, text: `${userName} is challenging you: ${challenge.title} (${challenge.durationDays} days). Accept?`, url: link }).catch(()=>{});
      } else { navigator.clipboard?.writeText(link).catch(()=>{}); showToast('Invite link copied! 📋', 'success'); }
    }

    const inp = { width:'100%', padding:'11px 14px', borderRadius:12, border:'1px solid rgba(255,255,255,0.12)', background:'rgba(255,255,255,0.05)', color:'#fff', fontSize:13, fontFamily:'inherit', outline:'none', marginBottom:8 };

    /* ─── CREATE VIEW ─── */
    if (cView === 'create') return (
      <div style={{ height:'100%', overflowY:'auto', background:'#0c0c18' }}>
        <div style={{ padding:'max(env(safe-area-inset-top),16px) 20px 40px' }}>
          <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:24 }}>
            <button onClick={() => setCView('list')} style={{ background:'rgba(255,255,255,0.06)', border:'none', color:'#aaa', borderRadius:10, padding:'8px 14px', cursor:'pointer', fontFamily:'inherit', fontSize:13, fontWeight:600 }}>← Back</button>
            <div>
              <div style={{ fontFamily:"'Bebas Neue',sans-serif", fontSize:10, letterSpacing:4, color:'#3a5a6a' }}>PUSH EACH OTHER</div>
              <div style={{ fontFamily:"'Oswald',sans-serif", fontSize:22, fontWeight:700, color:'#fff', lineHeight:1 }}>NEW CHALLENGE</div>
            </div>
          </div>

          <div style={{ fontSize:10, color:'#4a6a7a', letterSpacing:1, marginBottom:10 }}>CHALLENGE TYPE</div>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:8, marginBottom:20 }}>
            {CTYPES.map(t => (
              <button key={t.id} onClick={() => { setCType(t.id); setCTargetVal(String(t.defaultT)); }} style={{ padding:'12px 6px', borderRadius:14, border:`2px solid ${cType===t.id?accentColor:'rgba(255,255,255,0.08)'}`, background:cType===t.id?`${accentColor}18`:'rgba(255,255,255,0.03)', color:'#fff', cursor:'pointer', textAlign:'center', transition:'all 0.15s' }}>
                <div style={{ fontSize:22, marginBottom:4 }}>{t.emoji}</div>
                <div style={{ fontSize:10, fontFamily:"'Oswald',sans-serif", fontWeight:700, color:cType===t.id?accentColor:'#aaa', letterSpacing:0.3 }}>{t.label.toUpperCase()}</div>
                <div style={{ fontSize:9, color:'#555', marginTop:2 }}>{t.hint}</div>
              </button>
            ))}
          </div>

          <div style={{ fontSize:10, color:'#4a6a7a', letterSpacing:1, marginBottom:8 }}>CHALLENGE TITLE</div>
          <input value={cTitleVal} onChange={e => setCTitleVal(e.target.value)} placeholder={`e.g. ${ct.label} Challenge`} style={inp} />

          {cType !== 'custom' && (
            <>
              <div style={{ fontSize:10, color:'#4a6a7a', letterSpacing:1, marginBottom:8 }}>TARGET {ct.unit ? `(${ct.unit})` : ''}</div>
              <input type="number" value={cTargetVal} onChange={e => setCTargetVal(e.target.value)} placeholder={String(ct.defaultT)} style={{ ...inp, fontSize:26, fontFamily:"'Bebas Neue',sans-serif", textAlign:'center', letterSpacing:1 }} />
            </>
          )}

          <div style={{ fontSize:10, color:'#4a6a7a', letterSpacing:1, marginBottom:10 }}>DURATION</div>
          <div style={{ display:'flex', gap:8, marginBottom:20 }}>
            {[['3','3\nDAYS'],['7','1\nWEEK'],['14','2\nWEEKS'],['30','1\nMONTH']].map(([v,l]) => (
              <button key={v} onClick={() => setCDaysVal(v)} style={{ flex:1, padding:'12px 4px', borderRadius:14, border:`2px solid ${cDaysVal===v?accentColor:'rgba(255,255,255,0.1)'}`, background:cDaysVal===v?`${accentColor}18`:'transparent', color:cDaysVal===v?accentColor:'#aaa', cursor:'pointer', fontFamily:"'Bebas Neue',sans-serif", fontSize:14, lineHeight:1.2, whiteSpace:'pre', transition:'all 0.15s' }}>{l}</button>
            ))}
          </div>

          <div style={{ fontSize:10, color:'#4a6a7a', letterSpacing:1, marginBottom:8 }}>FRIEND'S NAME <span style={{ color:'#333' }}>(optional)</span></div>
          <input value={cFriend} onChange={e => setCFriend(e.target.value)} placeholder="Who are you challenging?" style={inp} />

          <button onClick={doCreate} style={{ width:'100%', padding:16, borderRadius:16, border:'none', background:accentColor, color:'#000', fontFamily:"'Oswald',sans-serif", fontSize:18, fontWeight:800, cursor:'pointer', letterSpacing:1, marginTop:8 }}>
            🎯 CREATE &amp; GET INVITE LINK
          </button>
        </div>
      </div>
    );

    /* ─── LIST VIEW ─── */
    return (
      <div style={{ height:'100%', display:'flex', flexDirection:'column', background:'#0c0c18' }}>
        {/* Header */}
        <div style={{ padding:'max(env(safe-area-inset-top),14px) 20px 12px', flexShrink:0, background:`linear-gradient(160deg,${accentColor}15 0%,#0c0c18 80%)` }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:4 }}>
            <div>
              <div style={{ fontFamily:"'Bebas Neue',sans-serif", fontSize:11, letterSpacing:4, color:'#3a5a6a' }}>PUSH EACH OTHER</div>
              <div style={{ fontFamily:"'Oswald',sans-serif", fontSize:28, fontWeight:700, color:'#fff', lineHeight:1 }}>CHALLENGES</div>
            </div>
            <div style={{ display:'flex', gap:8, alignItems:'center' }}>
              <div style={{ fontSize:9, color: syncing ? accentColor : '#3a5a6a', fontWeight:700 }}>{syncing ? '⟳ SYNC' : '📡 P2P'}</div>
              <button onClick={() => { setCView('create'); setCreatedLink(null); setCTitleVal(''); setCFriend(''); setCTargetVal(String(CTYPES[0].defaultT)); setCType('protein'); }} style={{ padding:'10px 16px', borderRadius:14, border:`1px solid ${accentColor}50`, background:`${accentColor}18`, color:accentColor, fontFamily:"'Oswald',sans-serif", fontSize:13, fontWeight:700, cursor:'pointer' }}>+ NEW</button>
            </div>
          </div>
          {lastSync && <div style={{ fontSize:9, color:'#3a5a6a', marginTop:4 }}>Synced {lastSync.toLocaleTimeString()} · live P2P sync · no setup needed</div>}

          {/* Created link banner */}
          {createdLink && (
            <div className="pop" style={{ background:`${accentColor}12`, border:`1px solid ${accentColor}35`, borderRadius:14, padding:'12px 14px', marginTop:10 }}>
              <div style={{ fontSize:12, color:accentColor, fontWeight:700, marginBottom:6 }}>🔗 Challenge link ready — send it to your friend!</div>
              <div style={{ display:'flex', gap:8 }}>
                <button onClick={() => { navigator.clipboard?.writeText(createdLink).catch(()=>{}); showToast('Copied! 📋','success'); }} style={{ flex:1, padding:'9px', borderRadius:10, border:`1px solid ${accentColor}50`, background:`${accentColor}18`, color:accentColor, fontFamily:"'Oswald',sans-serif", fontSize:11, fontWeight:700, cursor:'pointer' }}>📋 COPY LINK</button>
                {navigator.share && <button onClick={() => navigator.share({ title:'Hub Challenge', text:`${userName} challenged you!`, url:createdLink }).catch(()=>{})} style={{ flex:1, padding:'9px', borderRadius:10, border:'1px solid rgba(74,158,255,0.4)', background:'rgba(74,158,255,0.1)', color:'#4A9EFF', fontFamily:"'Oswald',sans-serif", fontSize:11, fontWeight:700, cursor:'pointer' }}>📤 SHARE</button>}
                <button onClick={() => setCreatedLink(null)} style={{ padding:'9px 12px', borderRadius:10, border:'1px solid rgba(255,255,255,0.1)', background:'transparent', color:'#555', cursor:'pointer' }}>✕</button>
              </div>
            </div>
          )}
        </div>

        <div style={{ flex:1, overflowY:'auto', padding:'12px 20px', paddingBottom:40 }}>
          {myChallenges.length === 0 ? (
            <div style={{ textAlign:'center', paddingTop:40 }}>
              <div style={{ fontSize:64, marginBottom:14 }}>🏆</div>
              <div style={{ fontFamily:"'Oswald',sans-serif", fontSize:22, fontWeight:700, color:'#fff', marginBottom:8 }}>NO ACTIVE CHALLENGES</div>
              <div style={{ fontSize:13, color:'#4a6a7a', marginBottom:24, lineHeight:1.6, maxWidth:280, margin:'0 auto 24px' }}>Create a challenge, share the link — both of your progress updates automatically as you log food and workouts.</div>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:20, textAlign:'left' }}>
                {[ {emoji:'💪',title:'Protein War',desc:'Who hits protein more days'}, {emoji:'🏋️',title:'Gym Grind',desc:'Most workouts in 30 days'}, {emoji:'🔥',title:'Calorie Club',desc:'Stay in range every day'}, {emoji:'💰',title:'Budget Boss',desc:'Stay under grocery budget'} ].map(t => (
                  <div key={t.title} onClick={() => setCView('create')} style={{ background:'rgba(255,255,255,0.03)', borderRadius:14, padding:12, border:'1px solid rgba(255,255,255,0.06)', cursor:'pointer' }}>
                    <div style={{ fontSize:20, marginBottom:4 }}>{t.emoji}</div>
                    <div style={{ fontSize:12, color:'#ddd', fontWeight:700 }}>{t.title}</div>
                    <div style={{ fontSize:10, color:'#555', marginTop:2 }}>{t.desc}</div>
                  </div>
                ))}
              </div>
              <button onClick={() => setCView('create')} style={{ padding:'14px 32px', borderRadius:16, border:'none', background:accentColor, color:'#000', fontFamily:"'Oswald',sans-serif", fontSize:16, fontWeight:800, cursor:'pointer', letterSpacing:0.5 }}>START A CHALLENGE →</button>
            </div>
          ) : myChallenges.slice().reverse().map(challenge => {
            const board = getLeaderboard(challenge);
            const me = board.find(p => p.isMe) || board[0];
            const endDate = new Date(challenge.startDate); endDate.setDate(endDate.getDate() + challenge.durationDays);
            const isOver  = new Date() > endDate;
            const daysLeft = Math.max(0, Math.ceil((endDate - new Date()) / 86400000));
            const todayISO = todayStr();
            const todayDone = me?.days.find(d => d.ds === todayISO)?.status === 'done';
            const showCheckin = challenge.type === 'custom' && !todayDone && !isOver;
            const leader = board[0];
            const iWinning = leader?.isMe;

            return (
              <div key={challenge.id} className="pop" style={{ background:'rgba(255,255,255,0.03)', borderRadius:20, padding:16, marginBottom:16, border:`1px solid ${isOver&&(me?.pct||0)>=70?accentColor+'50':'rgba(255,255,255,0.06)'}` }}>
                {/* Challenge header */}
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:14 }}>
                  <div style={{ display:'flex', gap:11, alignItems:'center' }}>
                    <div style={{ width:46, height:46, borderRadius:14, background:`${accentColor}18`, border:`1px solid ${accentColor}30`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:24, flexShrink:0 }}>{challenge.emoji}</div>
                    <div>
                      <div style={{ fontFamily:"'Oswald',sans-serif", fontSize:16, fontWeight:700, color:'#fff' }}>{challenge.title}</div>
                      <div style={{ fontSize:10, color:isOver?'#555':'#4a6a7a', marginTop:2 }}>{isOver ? '🏁 FINISHED' : `⏳ ${daysLeft} day${daysLeft!==1?'s':''} left`} · {challenge.durationDays}d challenge</div>
                    </div>
                  </div>
                  {board.length > 1 && (
                    <div style={{ textAlign:'center', flexShrink:0 }}>
                      <div style={{ fontSize:11, color: iWinning ? accentColor : '#FF6B4A', fontWeight:700 }}>{iWinning ? '🥇 LEADING' : '🔥 BEHIND'}</div>
                      <div style={{ fontSize:9, color:'#555', marginTop:1 }}>{board.length} players</div>
                    </div>
                  )}
                </div>

                {/* LEADERBOARD — one row per participant */}
                <div style={{ display:'flex', flexDirection:'column', gap:10, marginBottom:14 }}>
                  {board.map((p, rank) => (
                    <div key={p.pid} style={{ background: p.isMe ? `${accentColor}0c` : 'rgba(255,255,255,0.02)', borderRadius:14, padding:'10px 12px', border:`1px solid ${p.isMe ? accentColor+'30' : 'rgba(255,255,255,0.05)'}` }}>
                      {/* Participant header row */}
                      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8 }}>
                        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                          <span style={{ fontSize:20 }}>{p.avatar}</span>
                          <div>
                            <div style={{ fontSize:13, fontWeight:700, color: p.isMe ? accentColor : '#ddd' }}>
                              {rank === 0 && board.length > 1 ? '🥇 ' : rank === 1 ? '🥈 ' : ''}{p.name}{p.isMe ? ' (you)' : ''}
                            </div>
                            <div style={{ fontSize:9, color:'#555' }}>{p.done}/{p.past} days hit · {p.pct}%</div>
                          </div>
                        </div>
                        <div style={{ fontFamily:"'Bebas Neue',sans-serif", fontSize:26, color: p.pct>=75?accentColor:p.pct>=40?'#F59E0B':'#FF6B4A', lineHeight:1 }}>{p.pct}%</div>
                      </div>
                      {/* Progress bar */}
                      <div style={{ height:5, borderRadius:3, background:'rgba(255,255,255,0.07)', overflow:'hidden', marginBottom:8 }}>
                        <div style={{ height:'100%', borderRadius:3, background: p.pct>=75?accentColor:p.pct>=40?'#F59E0B':'#FF6B4A', width:`${p.pct}%`, transition:'width 0.5s ease' }} />
                      </div>
                      {/* Day dots */}
                      <div style={{ display:'flex', flexWrap:'wrap', gap:4 }}>
                        {p.days.map((day, i) => {
                          const s = day.status;
                          const bg = s==='done'?accentColor:s==='miss'?'rgba(255,107,74,0.55)':s==='over'?'#F59E0B':'rgba(255,255,255,0.07)';
                          const isToday = day.ds === todayISO;
                          return (
                            <div key={i} title={day.ds} style={{ width:20, height:20, borderRadius:6, background:bg, display:'flex', alignItems:'center', justifyContent:'center', fontSize:9, color:s==='done'?'#000':'rgba(255,255,255,0.6)', boxShadow:isToday?`0 0 0 2px ${accentColor}`:'none' }}>
                              {s==='done'?'✓':s==='miss'?'✗':s==='over'?'↑':''}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  ))}
                </div>

                {/* Action row */}
                <div style={{ display:'flex', gap:7, flexWrap:'wrap' }}>
                  {showCheckin && (
                    <button onClick={() => doCheckIn(challenge.id)} style={{ flex:'1 1 110px', padding:'9px 6px', borderRadius:11, border:`1px solid ${accentColor}50`, background:`${accentColor}18`, color:accentColor, fontFamily:"'Oswald',sans-serif", fontSize:11, fontWeight:700, cursor:'pointer' }}>✓ CHECK IN</button>
                  )}
                  <button onClick={() => doInvite(challenge)} style={{ flex:'1 1 90px', padding:'9px 6px', borderRadius:11, border:'1px solid rgba(168,85,247,0.4)', background:'rgba(168,85,247,0.08)', color:'#A855F7', fontFamily:"'Oswald',sans-serif", fontSize:11, fontWeight:700, cursor:'pointer' }}>🔗 INVITE</button>
                  <button onClick={() => doDelete(challenge.id)} style={{ padding:'9px 11px', borderRadius:11, border:'1px solid rgba(255,80,80,0.2)', background:'transparent', color:'rgba(255,80,80,0.45)', cursor:'pointer', fontSize:13 }}>🗑</button>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  /* ══════════════════════════════════════════════
     ONBOARDING SCREEN
  ══════════════════════════════════════════════ */
  function OnboardingScreen() {
    const [step, setStep] = useState(0);
    const [localName,     setLocalName]     = useState('');
    const [localAvatar,   setLocalAvatar]   = useState('💪');
    const [localGoal,     setLocalGoal]     = useState('recomp');
    const [localSex,      setLocalSex]      = useState('male');
    const [localActivity, setLocalActivity] = useState('moderate');
    const [localBudget,   setLocalBudget]   = useState('150');
    const avatarOptions = ['💪','🏋️','🔥','⚡','🦾','🥊','🏃','🧠','🎯','🥷','🦅','🌊','🐺','⚔️','🛡️','💎','🌟','🚀'];
    // 6 steps: name, avatar, goal, body stats, activity, budget
    const steps = ['Who are you?','Pick your avatar','Set your goal','Your body','Activity level','Your budget'];
    const canNext = step === 0 ? localName.trim().length >= 2 : true;

    function finish() {
      const name = localName.trim() || 'Athlete';
      setUserName(name);
      setUserAvatar(localAvatar || '💪');
      setUserGoal(localGoal || 'recomp');
      setUserSex(localSex);
      setActivityLevel(localActivity);
      setWeekBudget(parseFloat(localBudget) || 150);
      save('userName',      name);
      save('userAvatar',    localAvatar || '💪');
      save('userGoal',      localGoal || 'recomp');
      save('userSex',       localSex);
      save('activityLevel', localActivity);
      save('weekBudget',    parseFloat(localBudget) || 150);
      save('onboarded',     true);
      setOnboarded(true);
      setScreen('home');
      setTimeout(() => showToast(`Welcome, ${name}! 🎉`, 'success'), 300);
    }

    const accent = '#4BDE80';
    const stepEmojis = ['👋', localAvatar, GOAL_PRESETS[localGoal].emoji, localSex === 'female' ? '♀️' : '♂️', '🏃', '💰'];
    const stepSubs   = [
      'This is your personal fitness hub.',
      'Choose an avatar that represents you.',
      "We'll tailor your macros and plans to your goal.",
      "We'll use this to calculate your exact calorie target.",
      "More accurate than any preset — we'll calculate your TDEE.",
      "We'll use this for meal planning & shopping.",
    ];
    return (
      <div style={{ height: '100%', overflowY: 'auto', background: 'linear-gradient(160deg,#0c1220 0%,#0c0c18 100%)', display: 'flex', flexDirection: 'column', padding: '0 24px' }}>
        {/* Progress dots */}
        <div style={{ display: 'flex', justifyContent: 'center', gap: 8, paddingTop: 'max(env(safe-area-inset-top),40px)', marginBottom: 32 }}>
          {steps.map((_,i) => (
            <div key={i} style={{ width: i === step ? 24 : 8, height: 8, borderRadius: 4, background: i <= step ? accent : 'rgba(255,255,255,0.12)', transition: 'all 0.3s' }} />
          ))}
        </div>

        <div style={{ textAlign: 'center', marginBottom: 36 }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>{stepEmojis[step]}</div>
          <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 32, color: '#fff', letterSpacing: 1.5, lineHeight: 1.1 }}>{steps[step].toUpperCase()}</div>
          <div style={{ fontSize: 13, color: '#4a6a7a', marginTop: 8 }}>{stepSubs[step]}</div>
        </div>

        {/* Step 0 — Name */}
        {step === 0 && (
          <div>
            <input
              autoFocus
              value={localName}
              onChange={e => setLocalName(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && canNext && setStep(1)}
              placeholder="Your name…"
              style={{ width: '100%', padding: '16px 20px', borderRadius: 16, border: `2px solid ${localName.trim().length >= 2 ? accent : 'rgba(255,255,255,0.1)'}`, background: 'rgba(255,255,255,0.05)', color: '#fff', fontSize: 22, fontFamily: "'Oswald',sans-serif", outline: 'none', textAlign: 'center', letterSpacing: 1, transition: 'border 0.2s' }}
            />
            <div style={{ fontSize: 11, color: '#4a6a7a', textAlign: 'center', marginTop: 10 }}>This is how you'll be greeted every day</div>
          </div>
        )}

        {/* Step 1 — Avatar */}
        {step === 1 && (
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(6,1fr)', gap: 10 }}>
            {avatarOptions.map(a => (
              <button key={a} onClick={() => setLocalAvatar(a)} style={{ fontSize: 28, padding: 10, borderRadius: 14, border: `2px solid ${localAvatar === a ? accent : 'rgba(255,255,255,0.06)'}`, background: localAvatar === a ? `${accent}18` : 'rgba(255,255,255,0.03)', cursor: 'pointer', transition: 'all 0.15s' }}>
                {a}
              </button>
            ))}
          </div>
        )}

        {/* Step 2 — Goal */}
        {step === 2 && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {Object.entries(GOAL_PRESETS).map(([k, g]) => (
              <button key={k} onClick={() => setLocalGoal(k)} style={{ padding: '14px 16px', borderRadius: 16, border: `2px solid ${localGoal === k ? accent : 'rgba(255,255,255,0.08)'}`, background: localGoal === k ? `${accent}12` : 'rgba(255,255,255,0.03)', color: '#fff', cursor: 'pointer', textAlign: 'left', transition: 'all 0.15s' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                  <span style={{ fontSize: 26 }}>{g.emoji}</span>
                  <div>
                    <div style={{ fontFamily: "'Oswald',sans-serif", fontSize: 16, fontWeight: 700, color: localGoal === k ? accent : '#fff' }}>{g.label.toUpperCase()}</div>
                    <div style={{ fontSize: 11, color: '#555', marginTop: 2 }}>{g.desc}</div>
                  </div>
                  {localGoal === k && <span style={{ marginLeft: 'auto', color: accent, fontSize: 18 }}>✓</span>}
                </div>
              </button>
            ))}
          </div>
        )}

        {/* Step 3 — Body (sex picker) */}
        {step === 3 && (
          <div>
            <div style={{ fontSize: 10, color: '#4a6a7a', letterSpacing: 1, marginBottom: 12, textAlign: 'center' }}>BIOLOGICAL SEX (for BMR accuracy)</div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 20 }}>
              {[{ id:'male', emoji:'♂', label:'Male' }, { id:'female', emoji:'♀', label:'Female' }].map(s => (
                <button key={s.id} onClick={() => setLocalSex(s.id)} style={{ padding: '24px 16px', borderRadius: 20, border: `2px solid ${localSex === s.id ? accent : 'rgba(255,255,255,0.1)'}`, background: localSex === s.id ? `${accent}18` : 'rgba(255,255,255,0.03)', cursor: 'pointer', textAlign: 'center' }}>
                  <div style={{ fontSize: 40, marginBottom: 8 }}>{s.emoji}</div>
                  <div style={{ fontFamily:"'Oswald',sans-serif", fontSize: 18, fontWeight: 700, color: localSex === s.id ? accent : '#fff' }}>{s.label}</div>
                </button>
              ))}
            </div>
            <div style={{ fontSize: 11, color: '#4a6a7a', textAlign: 'center' }}>
              Used only for calorie calculation. You can change this later in Profile.
            </div>
          </div>
        )}

        {/* Step 4 — Activity level */}
        {step === 4 && (

        {step === 5 && (

          </div>

        <div style={{ display: 'flex', gap: 12, marginTop: 40, paddingBottom: 'max(env(safe-area-inset-bottom),32px)' }}>

            disabled={!canNext}
            style={{ flex: 2, padding: 16, borderRadius: 16, border: 'none', background: canNext ? accent : 'rgba(255,255,255,0.06)', color: canNext ? '#000' : '#333', fontFamily: "'Oswald',sans-serif", fontSize: 18, fontWeight: 800, cursor: canNext ? 'pointer' : 'not-allowed', letterSpacing: 1, transition: 'all 0.2s' }}
          >
            {step < 5 ? 'NEXT →' : '🚀 LET\'S GO'}
          </button>
        </div>
      </div>
    );
  }

  /* ── Supabase auth helpers ── */
  async function syncProfileToSupabase(user) {
    if (!_sb || !user) return;
    try {
      await _sb.from('profiles').upsert({
        id: user.id,
        email: user.email,
        user_name: userName,
        user_goal: userGoal,
        user_sex: userSex,
        user_age: userAge,
        user_weight: userWeight,
        user_height: userHeight,
        activity_level: activityLevel,
        accent_color: accentColor,
        earned_badges: earnedBadges,
        updated_at: new Date().toISOString(),
      }, { onConflict: 'id' });
      showToast('✓ Profile synced to cloud', 'success');
    } catch(e) { console.warn('Sync error', e); }
  }

  async function handleSignIn() {
    if (!_sb) return showToast('Supabase not configured', 'error');
    setAuthLoading(true);
    const { error } = await _sb.auth.signInWithPassword({ email: authEmail, password: authPassword });
    setAuthLoading(false);
    if (error) { showToast(error.message, 'error'); } else { setShowAuth(false); setAuthEmail(''); setAuthPassword(''); }
  }

  async function handleSignUp() {
    if (!_sb) return showToast('Supabase not configured', 'error');
    setAuthLoading(true);
    const { error } = await _sb.auth.signUp({ email: authEmail, password: authPassword });
    setAuthLoading(false);
    if (error) { showToast(error.message, 'error'); }
    else { showToast('Check your email to confirm!', 'success'); setShowAuth(false); setAuthEmail(''); setAuthPassword(''); }
  }

  async function handleGoogleAuth() {
    if (!_sb) return showToast('Supabase not configured', 'error');
    await _sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } });
  }

  async function handleSignOut() {
    if (!_sb) return;
    await _sb.auth.signOut();
    setCurrentUser(null);
  }

                          <span>Progress to {lv.next.emoji} {lv.next.name}</span>
                          <span style={{ color:'#aaa' }}>{lv.xpToNext} XP to go</span>
                        </div>
                        <div style={{ height:6, borderRadius:3, background:'rgba(255,255,255,0.06)', overflow:'hidden' }}>
                          <div style={{ height:'100%', borderRadius:3, background:`linear-gradient(90deg,${accentColor},#A855F7)`, width:`${Math.round(lv.progress*100)}%`, transition:'width 0.5s' }} />
                        </div>
                      </div>
                    )}
                    {!lv.next && <div style={{ fontSize:12, color:accentColor, fontWeight:700 }}>🏆 MAX LEVEL REACHED</div>}
                  </div>
                );
              })()}

              {/* WEIGHT MINI CHART */}
              {weightLog.length >= 2 && (() => {
                const trend = getWeightTrend(14);
                const pts = weightLog.slice(-20);
                const minW = Math.min(...pts.map(p=>p.weight)) - 1;
                const maxW = Math.max(...pts.map(p=>p.weight)) + 1;
                const W = 280, H = 60, pad = 10;
                const x = i => pad + (i / (pts.length - 1)) * (W - pad*2);
                const y = w => H - pad - ((w - minW) / (maxW - minW)) * (H - pad*2);
                const polyline = pts.map((p,i) => `${x(i)},${y(p.weight)}`).join(' ');
                const areaPath = `M${x(0)},${H} L${pts.map((p,i)=>`${x(i)},${y(p.weight)}`).join(' L')} L${x(pts.length-1)},${H} Z`;
                return (
                  <div style={{ background:'rgba(255,255,255,0.03)', borderRadius:16, padding:'14px 16px', border:'1px solid rgba(255,255,255,0.06)', marginBottom:16 }}>
                    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10 }}>
                      <div style={{ fontSize:10, color:'#4a6a7a', letterSpacing:1 }}>⚖️ WEIGHT TREND</div>
                      {trend && (
                        <div style={{ fontSize:12, fontWeight:700, color: trend.delta < 0 ? accentColor : trend.delta > 0 ? '#FF6B4A' : '#F5C842' }}>
                          {trend.delta > 0 ? '+' : ''}{trend.delta} lbs / {trend.days}d
                        </div>
                      )}
                    </div>
                    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ overflow:'visible' }}>
                      <defs>
                        <linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
                          <stop offset="0%" stopColor={accentColor} stopOpacity="0.3" />
                          <stop offset="100%" stopColor={accentColor} stopOpacity="0" />
                        </linearGradient>
                      </defs>
                      <path d={areaPath} fill="url(#wg)" />
                      <polyline points={polyline} fill="none" stroke={accentColor} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
                      {pts.slice(-1).map((p,_) => (
                        <circle key="last" cx={x(pts.length-1)} cy={y(p.weight)} r="4" fill={accentColor} />
                      ))}
                    </svg>
                    <div style={{ display:'flex', justifyContent:'space-between', fontSize:10, color:'#4a6a7a', marginTop:4 }}>
                      <span>{pts[0]?.date?.slice(5)}</span>
                      <span style={{ color:'#aaa', fontWeight:700 }}>{pts[pts.length-1]?.weight} lbs</span>
                      <span>{pts[pts.length-1]?.date?.slice(5)}</span>
                    </div>
                  </div>
                );
              })()}

              {/* ── STREAK CALENDAR ── */}
              {StreakCalendar()}

              {/* ── AUTO-ADJUST BANNER ── */}
              {(() => {
                const adj = computeAutoAdjust();
                if (!adj) return null;
                return (
                  <div style={{ borderRadius:16, padding:'14px 16px', border:`1px solid ${adj.color}40`, background:`${adj.color}10`, marginBottom:16 }}>
                    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
                      <div style={{ flex:1 }}>
                        <div style={{ fontSize:11, fontWeight:700, color:adj.color, marginBottom:4 }}>
                          {adj.icon} LEVEL AUTO-ADJUST · {adj.title}
                        </div>
                        <div style={{ fontSize:12, color:'#aaa', lineHeight:1.5, marginBottom: adj.actionLabel ? 10 : 0 }}>{adj.msg}</div>
                        {adj.actionLabel && adj.action && (
                          <button onClick={() => { adj.action(); setAdjustDismissed(todayStr()); }}
                            style={{ padding:'7px 14px', borderRadius:10, border:`1px solid ${adj.color}60`, background:`${adj.color}20`, color:adj.color, fontSize:11, fontFamily:"'Oswald',sans-serif", fontWeight:700, cursor:'pointer' }}>
                            ✓ {adj.actionLabel}
                          </button>
                        )}
                      </div>
                      <button onClick={() => setAdjustDismissed(todayStr())}
                        style={{ background:'none', border:'none', color:'#555', fontSize:16, cursor:'pointer', paddingLeft:8, flexShrink:0 }}>✕</button>
                    </div>
                  </div>
                );
              })()}

              {/* ── WEEKLY REVIEW ── */}
              {(() => {
                const ws = getWeekStart();
                const wd = getWeekData(ws);
                const hasThisWeek = weeklyReview?.weekStart === ws;
                return (
                  <div style={{ background:'rgba(255,255,255,0.03)', borderRadius:16, padding:'14px 16px', border:'1px solid rgba(255,255,255,0.06)', marginBottom:16 }}>
                    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10 }}>
                      <div style={{ fontSize:10, color:'#4a6a7a', letterSpacing:1 }}>📊 WEEKLY REVIEW</div>
                      <button onClick={generateWeeklyReview} disabled={reviewLoading || hasThisWeek}
                        style={{ fontSize:10, padding:'5px 10px', borderRadius:8, border:`1px solid ${hasThisWeek ? accentColor+'40' : 'rgba(168,85,247,0.4)'}`, background: hasThisWeek ? `${accentColor}15` : 'rgba(168,85,247,0.12)', color: hasThisWeek ? accentColor : '#A855F7', cursor: hasThisWeek ? 'default' : 'pointer', fontFamily:"'Oswald',sans-serif", fontWeight:700 }}>
                        {reviewLoading ? '⏳ ANALYZING…' : hasThisWeek ? '✓ THIS WEEK' : '🧠 GENERATE'}
                      </button>
                    </div>
                    {/* Week stats mini-grid */}
                    <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:6, marginBottom: weeklyReview ? 12 : 0 }}>
                      {[
                        { label:'LOGGED', value:`${wd.loggedDays}/7 days`, color:'#4A9EFF' },
                        { label:'WORKOUTS', value:`${wd.workoutsInWeek} sessions`, color:accentColor },
                        { label:'AVG CAL', value:`${wd.avgCal||0} kcal`, color:'#FF6B4A' },
                        { label:'AVG PRO', value:`${wd.avgPro||0}g`, color:accentColor },
                        { label:'AVG ENERGY', value: wd.avgEnergy ? `${wd.avgEnergy}/10` : '—', color:'#F5C842' },
                        { label:'WEIGHT Δ', value: wd.weightDelta !== null ? `${wd.weightDelta > 0 ? '+' : ''}${wd.weightDelta}lbs` : '—', color: wd.weightDelta < 0 ? accentColor : '#FF6B4A' },
                      ].map(s => (
                        <div key={s.label} style={{ background:'rgba(0,0,0,0.2)', borderRadius:10, padding:'8px 6px', textAlign:'center' }}>
                          <div style={{ fontSize:12, fontWeight:700, color:s.color, lineHeight:1 }}>{s.value}</div>
                          <div style={{ fontSize:8, color:'#444', marginTop:2, letterSpacing:0.5 }}>{s.label}</div>
                        </div>
                      ))}
                    </div>
                    {weeklyReview && (
                      <div style={{ padding:'12px 14px', borderRadius:12, background:'rgba(168,85,247,0.08)', border:'1px solid rgba(168,85,247,0.2)' }}>
                        <div style={{ fontSize:10, color:'#A855F7', letterSpacing:1, fontWeight:700, marginBottom:6 }}>🧠 LEVEL SAYS · Week of {weeklyReview.weekStart}</div>
                        <div style={{ fontSize:12, color:'#ccc', lineHeight:1.6 }}>{weeklyReview.text}</div>
                      </div>
                    )}
                    {!weeklyReview && !reviewLoading && (
                      <div style={{ fontSize:11, color:'#444', textAlign:'center', paddingTop:4 }}>Hit Generate for your AI-powered weekly breakdown</div>
                    )}
                  </div>
                );
              })()}

              {/* RECENT CHECK-INS */}
              {checkIns.length > 0 && (
                <div style={{ background:'rgba(255,255,255,0.03)', borderRadius:16, padding:'14px 16px', border:'1px solid rgba(255,255,255,0.06)', marginBottom:16 }}>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10 }}>
                    <div style={{ fontSize:10, color:'#4a6a7a', letterSpacing:1 }}>📊 RECENT CHECK-INS</div>
                    <button onClick={generateLevelInsight} disabled={insightLoading}
                      style={{ fontSize:10, padding:'5px 10px', borderRadius:8, border:`1px solid ${accentColor}40`, background:`${accentColor}15`, color:accentColor, cursor:'pointer', fontFamily:"'Oswald',sans-serif", fontWeight:700 }}>
                      {insightLoading ? '...' : '🧠 LEVEL INSIGHT'}

                  </div>
                  {checkIns.slice(-5).reverse().map((ci,i) => (
                    <div key={i} style={{ display:'flex', gap:12, padding:'8px 0', borderTop: i > 0 ? '1px solid rgba(255,255,255,0.04)' : undefined, alignItems:'center' }}>
                      <div style={{ fontSize:10, color:'#555', minWidth:50 }}>{ci.date?.slice(5)}</div>
                      <div style={{ display:'flex', gap:8, flex:1, flexWrap:'wrap' }}>
                        <span style={{ fontSize:11, color:'#aaa' }}>⚡{ci.energy}</span>
                        <span style={{ fontSize:11, color:'#aaa' }}>🍽️{ci.hunger}</span>
                        <span style={{ fontSize:11, color:'#aaa' }}>🥗{ci.dietScore}</span>
                        {ci.workoutDone && <span style={{ fontSize:11, color:accentColor }}>💪Done</span>}
                        {ci.weight && <span style={{ fontSize:11, color:'#F5C842' }}>{ci.weight}lbs</span>}
                      </div>
                    </div>
                  ))}
                  {levelInsight && (
                    <div style={{ marginTop:12, padding:'12px 14px', borderRadius:12, background:'rgba(168,85,247,0.08)', border:'1px solid rgba(168,85,247,0.2)' }}>
                      <div style={{ fontSize:10, color:'#A855F7', letterSpacing:1, fontWeight:700, marginBottom:6 }}>🧠 LEVEL SAYS · {levelInsight.date}</div>
                      <div style={{ fontSize:12, color:'#ccc', lineHeight:1.6, whiteSpace:'pre-wrap' }}>{levelInsight.text}</div>
                    </div>
                  )}
                </div>
              )}

              {/* Dynamic calorie summary card */}
              {goal.dynamic ? (
                <div style={{ background: `${accentColor}12`, borderRadius: 20, padding: '16px 18px', border: `1px solid ${accentColor}30`, marginBottom: 20 }}>

                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 6, marginBottom: 12 }}>
                    {[
                      { label: 'CALORIES', value: goal.cal,     color: '#FF6B4A', unit: 'kcal' },
                      { label: 'PROTEIN',  value: goal.protein, color: accentColor, unit: 'g' },
                      { label: 'CARBS',    value: goal.carbs,   color: '#A855F7', unit: 'g' },
                      { label: 'FAT',      value: goal.fat,     color: '#F5C842', unit: 'g' },

                      <div key={m.label} style={{ textAlign: 'center', background: 'rgba(0,0,0,0.2)', borderRadius: 12, padding: '10px 4px' }}>

                        <div style={{ fontSize: 8, color: '#4a6a7a', letterSpacing: 0.5, marginTop: 2 }}>{m.label}</div>
                        <div style={{ fontSize: 8, color: '#3a5a6a' }}>{m.unit}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 10, color: '#4a6a7a' }}>
                    <span>BMR: <span style={{ color: '#aaa' }}>{goal.bmr} kcal</span></span>
                    <span>TDEE: <span style={{ color: '#aaa' }}>{goal.tdee} kcal</span></span>
                    <span>Goal adj: <span style={{ color: '#aaa' }}>{GOAL_ADJUSTMENTS[userGoal] >= 0 ? '+' : ''}{GOAL_ADJUSTMENTS[userGoal]} kcal</span></span>
                  </div>
                </div>
              ) : (
                <div style={{ background: 'rgba(255,165,0,0.08)', borderRadius: 14, padding: '12px 14px', border: '1px solid rgba(255,165,0,0.2)', marginBottom: 16 }}>
                  <div style={{ fontSize: 11, color: '#F59E0B', fontWeight: 700, marginBottom: 4 }}>📋 USING PRESET TARGETS</div>
                  <div style={{ fontSize: 11, color: '#4a6a7a' }}>
                    Add your age, weight, height + activity level in the Profile tab for a personalized calorie target calculated just for your body.
                  </div>
                </div>
              )}

              <div style={{ fontSize: 10, color: '#4a6a7a', letterSpacing: 1, marginBottom: 12 }}>TRAINING GOAL</div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginBottom: 24 }}>
                {Object.entries(GOAL_PRESETS).map(([k, g]) => (
                  <button key={k} onClick={() => { setUserGoal(k); showToast(`Goal set to ${g.label} ✓`, 'success'); }} style={{ padding: '14px 16px', borderRadius: 16, border: `2px solid ${userGoal === k ? accentColor : 'rgba(255,255,255,0.08)'}`, background: userGoal === k ? `${accentColor}12` : 'rgba(255,255,255,0.02)', color: '#fff', cursor: 'pointer', textAlign: 'left', transition: 'all 0.15s' }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                      <span style={{ fontSize: 26 }}>{g.emoji}</span>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontFamily: "'Oswald',sans-serif", fontSize: 15, fontWeight: 700, color: userGoal === k ? accentColor : '#fff' }}>{g.label.toUpperCase()}</div>
                        <div style={{ fontSize: 11, color: '#555', marginTop: 1 }}>{g.desc}</div>
                        {userGoal === k && goal.dynamic && (
                          <div style={{ fontSize: 11, color: accentColor, marginTop: 2 }}>
                            {goal.cal} cal · {goal.protein}g protein · {goal.carbs}g carbs · {goal.fat}g fat
                          </div>
                        )}
                        {!(userGoal === k && goal.dynamic) && (
                          <div style={{ fontSize: 11, color: '#444', marginTop: 2 }}>{g.cal} cal · {g.protein}g protein</div>
                        )}
                      </div>
                      {userGoal === k && <span style={{ color: accentColor, fontSize: 18 }}>✓</span>}
                    </div>
                  </button>
                ))}
              </div>

              {/* Today's macros progress */}
              <div style={{ fontSize: 10, color: '#4a6a7a', letterSpacing: 1, marginBottom: 12 }}>TODAY'S PROGRESS</div>
              {[
                { label: 'Calories', cur: todayCal,  target: goal.cal,     color: '#FF6B4A', unit: 'kcal' },
                { label: 'Protein',  cur: todayPro,  target: goal.protein, color: accentColor, unit: 'g' },
                { label: 'Carbs',    cur: todayCarb, target: goal.carbs,   color: '#4A9EFF', unit: 'g' },
                { label: 'Fat',      cur: todayFat,  target: goal.fat,     color: '#F59E0B', unit: 'g' },
              ].map(m => (
                <div key={m.label} style={{ marginBottom: 14 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 5 }}>
                    <span style={{ fontSize: 12, color: '#aaa' }}>{m.label}</span>
                    <span style={{ fontSize: 12, color: '#555' }}><span style={{ color: m.color, fontWeight: 700 }}>{m.cur}</span> / {m.target}{m.unit}</span>
                  </div>
                  <div style={{ height: 6, borderRadius: 3, background: 'rgba(255,255,255,0.07)', overflow: 'hidden' }}>
                    <div style={{ height: '100%', borderRadius: 3, background: m.color, width: `${Math.min((m.cur / m.target) * 100, 100)}%`, transition: 'width 0.4s' }} />
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* ── THEME TAB ── */}
          {pTab === 'theme' && (
            <div>
              <div style={{ fontSize: 10, color: '#4a6a7a', letterSpacing: 1, marginBottom: 12 }}>ACCENT COLOR</div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 10, marginBottom: 24 }}>
                {ACCENT_PRESETS.map(p => (
                  <button key={p.color} onClick={() => { setAccentColor(p.color); showToast(`Theme: ${p.label} ✓`, 'success'); }} style={{ padding: '14px 8px', borderRadius: 14, border: `2px solid ${accentColor === p.color ? p.color : 'rgba(255,255,255,0.08)'}`, background: `${p.color}${accentColor === p.color ? '28' : '10'}`, cursor: 'pointer', textAlign: 'center', transition: 'all 0.15s' }}>
                    <div style={{ width: 28, height: 28, borderRadius: '50%', background: p.color, margin: '0 auto 6px' }} />
                    <div style={{ fontSize: 9, color: accentColor === p.color ? p.color : '#555', fontWeight: 700, letterSpacing: 0.3 }}>{p.label.toUpperCase()}</div>
                  </button>
                ))}
              </div>

              <div style={{ fontSize: 10, color: '#4a6a7a', letterSpacing: 1, marginBottom: 12 }}>HOME WIDGETS</div>
              {[
                { key: 'macros', label: 'Macro Ring',       desc: 'Calories & protein progress circle', icon: '⭕' },
                { key: 'plan',   label: "Today's Plan",     desc: 'Meals scheduled for today',          icon: '📅' },
                { key: 'log',    label: 'Recent Log',       desc: 'Last few food entries',              icon: '📋' },
                { key: 'streak', label: 'Workout Streak',   desc: 'Consecutive training days',          icon: '🔥' },
              ].map(w => (
                <div key={w.key} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '14px 16px', background: 'rgba(255,255,255,0.02)', borderRadius: 14, marginBottom: 8, border: '1px solid rgba(255,255,255,0.05)' }}>
                  <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
                    <span style={{ fontSize: 22 }}>{w.icon}</span>
                    <div>
                      <div style={{ fontSize: 13, color: '#ddd', fontWeight: 600 }}>{w.label}</div>
                      <div style={{ fontSize: 11, color: '#4a6a7a' }}>{w.desc}</div>
                    </div>
                  </div>
                  <button onClick={() => { const n = { ...hubWidgets, [w.key]: !hubWidgets[w.key] }; setHubWidgets(n); }} style={{ width: 44, height: 26, borderRadius: 13, border: 'none', background: hubWidgets[w.key] ? accentColor : 'rgba(255,255,255,0.1)', cursor: 'pointer', position: 'relative', transition: 'background 0.2s', flexShrink: 0 }}>
                    <div style={{ position: 'absolute', top: 3, left: hubWidgets[w.key] ? 20 : 3, width: 20, height: 20, borderRadius: '50%', background: '#fff', transition: 'left 0.2s', boxShadow: '0 1px 4px rgba(0,0,0,0.4)' }} />
                  </button>
                </div>
              ))}

              <div style={{ fontSize: 10, color: '#4a6a7a', letterSpacing: 1, marginBottom: 12, marginTop: 20 }}>HUB NAME</div>
              <div style={{ display: 'flex', gap: 10, background: 'rgba(255,255,255,0.03)', borderRadius: 14, padding: 14, border: '1px solid rgba(255,255,255,0.06)', alignItems: 'center' }}>
                <span style={{ fontSize: 22 }}>{userAvatar}</span>
                <div>
                  <div style={{ fontFamily: "'Oswald',sans-serif", fontSize: 16, fontWeight: 700, color: accentColor }}>{userName ? `${userName}'s Hub` : "My Hub"}</div>
                  <div style={{ fontSize: 11, color: '#4a6a7a' }}>Shown on your home screen</div>
                </div>
              </div>
            </div>
          )}

          {/* ── APP TAB ── */}
          {pTab === 'app' && (
            <div>
              <div style={{ fontSize: 10, color: '#4a6a7a', letterSpacing: 1, marginBottom: 10 }}>WEEKLY GROCERY BUDGET</div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 20 }}>
                <span style={{ fontSize: 22, color: accentColor }}>$</span>
                <input type="number" value={sBudget2} onChange={e => setSBudget2(e.target.value)}
                  style={{ flex: 1, padding: '12px 14px', borderRadius: 12, border: '1px solid rgba(255,255,255,0.1)', background: 'rgba(255,255,255,0.05)', color: '#fff', fontSize: 22, fontFamily: "'Bebas Neue',sans-serif", textAlign: 'center', outline: 'none' }} />
                <span style={{ fontSize: 12, color: '#555' }}>/week</span>
              </div>

              {/* ── Account / Supabase ── */}
              <div style={{ marginBottom: 16, padding: '14px 14px', background: currentUser ? 'rgba(75,222,128,0.06)' : 'rgba(74,158,255,0.06)', borderRadius: 14, border: `1px solid ${currentUser ? 'rgba(75,222,128,0.2)' : 'rgba(74,158,255,0.15)'}` }}>
                <div style={{ fontSize: 11, color: currentUser ? '#4BDE80' : '#4A9EFF', fontWeight: 700, marginBottom: 6 }}>☁️ CLOUD ACCOUNT</div>
                {currentUser ? (
                  <div>
                    <div style={{ fontSize: 12, color: '#ddd', marginBottom: 10 }}>✓ Signed in as <span style={{ color: '#4BDE80' }}>{currentUser.email}</span></div>
                    <div style={{ display: 'flex', gap: 8 }}>
                      <button onClick={() => syncProfileToSupabase(currentUser)} style={{ flex: 1, padding: '9px 8px', borderRadius: 10, border: '1px solid rgba(75,222,128,0.3)', background: 'rgba(75,222,128,0.1)', color: '#4BDE80', fontSize: 12, fontWeight: 700, cursor: 'pointer' }}>⬆ SYNC NOW</button>
                      <button onClick={handleSignOut} style={{ flex: 1, padding: '9px 8px', borderRadius: 10, border: '1px solid rgba(255,80,80,0.3)', background: 'rgba(255,80,80,0.08)', color: '#ff6b6b', fontSize: 12, fontWeight: 700, cursor: 'pointer' }}>SIGN OUT</button>
                    </div>
                  </div>
                ) : (
                  <div>
                    <div style={{ fontSize: 11, color: '#4a6a7a', marginBottom: 10 }}>Sign in to back up your data & sync across devices</div>
                    <button onClick={() => setShowAuth(true)} style={{ width: '100%', padding: '11px 14px', borderRadius: 10, border: 'none', background: '#4A9EFF', color: '#000', fontFamily: "'Oswald',sans-serif", fontSize: 14, fontWeight: 700, cursor: 'pointer' }}>SIGN IN / CREATE ACCOUNT</button>
                  </div>
                )}
              </div>

              {/* AI Route status */}
              <div style={{ padding:'10px 12px', borderRadius:12, border:`1px solid ${_sb ? accentColor+'40' : 'rgba(255,165,0,0.4)'}`, background: _sb ? `${accentColor}0a` : 'rgba(255,165,0,0.08)', marginBottom:12 }}>
                <div style={{ fontSize:11, fontWeight:700, color: _sb ? accentColor : '#F59E0B', marginBottom:3 }}>
                  {_sb ? '✅ AI ROUTED VIA EDGE FUNCTION' : '⚠️ EDGE FUNCTION NOT CONNECTED'}
                </div>
                <div style={{ fontSize:10, color:'#555', lineHeight:1.5 }}>
                  {_sb
                    ? 'AI calls run server-side — no personal key needed. Add your Anthropic key as ANTHROPIC_KEY in Supabase Edge Function Secrets to enable.'
                    : 'Sign in above to use server-side AI. Or enter your Claude API key below as a fallback.'}
                </div>
              </div>
              <div style={{ fontSize: 10, color: '#4a6a7a', letterSpacing: 1, marginBottom: 8 }}>CLAUDE API KEY <span style={{ color:'#555' }}>(fallback if not signed in)</span></div>
